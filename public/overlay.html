<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuzlocke Overlay</title>
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Nuzlocke Overlay" />
  <link rel="manifest" href="/favicon/site.webmanifest" />

  <style>
    /* ============================================================
       RESET & BASE
       ============================================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
      font-family: 'FLURO', 'Segoe UI', sans-serif;
      color: #f0f4f8;
    }

    /* ============================================================
       FLURO FONTS
       ============================================================ */
    @font-face {
      font-family: 'FLURO';
      src: url('/fonts/KAZER-STUDIO-FLURO.OTF') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'FLURO';
      src: url('/fonts/KAZER-STUDIO-FLURO-BOLD.OTF') format('opentype');
      font-weight: bold;
      font-style: normal;
    }
    @font-face {
      font-family: 'FLURO';
      src: url('/fonts/KAZER-STUDIO-FLURO-LIGHT.OTF') format('opentype');
      font-weight: 300;
      font-style: normal;
    }
    @font-face {
      font-family: 'FLURO';
      src: url('/fonts/KAZER-STUDIO-FLURO-SEMIBOLD.OTF') format('opentype');
      font-weight: 600;
      font-style: normal;
    }

    /* ============================================================
       OVERLAY CONTAINER - fully transparent, full-width
       ============================================================ */
    #overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100vw;
      background: transparent !important;
      padding: 0 16px 12px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    #overlay.hidden {
      opacity: 0;
    }

    /* ============================================================
       PAIRS ROW - horizontal scroll of circles
       ============================================================ */
    #pairs-container {
      width: 100%;
      max-width: 100vw;
      overflow-x: auto;
      overflow-y: hidden;
      padding-top: 2em;
      padding-bottom: 2em;
      margin-bottom: -32px;
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 16px;
      transform: scale(1.5) translate(0px, -4em);
      pointer-events: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    #pairs-container::-webkit-scrollbar {
      display: none;
    }

    /* ============================================================
       PAIR CIRCLE - the "O" containing a duo
       ============================================================ */
    .pair-circle {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: visible;
      cursor: default;
      clip-path: none;
      -webkit-clip-path: none;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.52) 0%,
        rgba(255, 255, 255, 0.04) 50%,
        rgba(255, 255, 255, 0.60) 100%
      );
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.25s ease;
    }

    .pair-circle::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(
        135deg,
        transparent 25%,
        rgba(255, 255, 255, 0.08) 40%,
        rgba(255, 255, 255, 0.14) 50%,
        rgba(255, 255, 255, 0.08) 60%,
        transparent 75%
      );
      pointer-events: none;
      z-index: 0;
    }

    .pair-circle:hover {
      border-color: rgba(255, 255, 255, 0.12);
      filter: brightness(1.15);
    }

    .pair-circle.dead {
      border-color: rgba(248, 113, 113, 0.15);
      background: linear-gradient(
        135deg,
        rgba(40, 20, 25, 0.75) 0%,
        rgba(40, 20, 25, 0.75) 65%,
        rgba(55, 25, 30, 0.75) 65%,
        rgba(55, 25, 30, 0.75) 100%
      );
    }

    .pair-circle.dead:hover {
      border-color: rgba(248, 113, 113, 0.25);
    }

    /* ============================================================
       POKEMON NAMES inside circle - top & bottom
       ============================================================ */
    .pair-name-primary {
      font-family: 'FLURO', sans-serif;
      font-weight: 600;
      font-size: 1em;
      color: #f0f4f8;
      letter-spacing: 0.03em;
      text-align: center;
      position: absolute;
      top: 0px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      z-index: 3;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.25),
        0 0 20px rgba(255, 255, 255, 0.08),
        0 1px 4px rgba(0, 0, 0, 1);
    }

    .pair-name-primary.dead {
      color: rgba(248, 113, 113, 0.7);
    }

    .pair-name-secondary {
      font-family: 'FLURO', sans-serif;
      font-weight: 600;
      font-size: 1em;
      color: #f0f4f8;
      letter-spacing: 0.03em;
      text-align: center;
      position: absolute;
      bottom: 0px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      z-index: 3;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.25),
        0 0 20px rgba(255, 255, 255, 0.08),
        0 1px 4px rgba(0, 0, 0, 1);
    }

    .pair-name-secondary.dead {
      color: rgba(248, 113, 113, 0.7);
    }

    /* ============================================================
       SPRITES inside circle - stacked diagonally (Soul Link)
       ============================================================ */
    .circle-sprite {
      position: absolute;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: filter 0.3s ease;
      z-index: 1;
    }

    .circle-sprite.p1 {
      top: 8px;
      right: 64px;
      width: 7em;
      height: 7em;
    }

    .circle-sprite.p2 {
      top: 40px;
      right: -8px;
      width: 7em;
      height: 7em;
      z-index: 2;
      transform: scaleX(-1);
    }

    .circle-sprite.dead {
      filter: grayscale(1) brightness(0.35);
    }

    /* ============================================================
       SPRITES - Solo Nuzlocke (single Pokemon, centered, larger)
       Applied when a route has only one Pokemon (no "&" in species).
       ============================================================ */
    .circle-sprite.solo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 10em;
      height: 10em;
      z-index: 1;
    }

    /* ============================================================
       NAMES - Solo Nuzlocke (single name, centered at bottom)
       ============================================================ */
    .pair-name-solo {
      font-family: 'FLURO', sans-serif;
      font-weight: 600;
      font-size: 1em;
      color: #f0f4f8;
      letter-spacing: 0.03em;
      text-align: center;
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      z-index: 3;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.25),
        0 0 20px rgba(255, 255, 255, 0.08),
        0 1px 4px rgba(0, 0, 0, 1);
    }

    .pair-name-solo.dead {
      color: rgba(248, 113, 113, 0.7);
    }

    /* ============================================================
       EMPTY / LOADING / ERROR STATES
       ============================================================ */
    #loading,
    #error,
    #empty {
      display: none;
      text-align: center;
      padding: 20px 20px;
      font-family: 'FLURO', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
      pointer-events: auto;
    }

    #loading.active,
    #error.active,
    #empty.active {
      display: block;
    }

    #error.active {
      color: rgba(248, 113, 113, 0.6);
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.08);
      border-top-color: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 768px) {
      .pair-circle {
        width: 140px;
        height: 140px;
      }
      .circle-sprite.p1 {
        top: -20px;
        right: 50px;
        width: 8em;
        height: 8em;
      }
      .circle-sprite.p2 {
        top: 24px;
        right: -14px;
        width: 6.5em;
        height: 6.5em;
      }
      .pair-name-primary {
        font-size: 0.85em;
        top: 12px;
      }
      .pair-name-secondary {
        font-size: 0.7em;
        bottom: 12px;
      }
    }

    @media (max-width: 480px) {
      .pair-circle {
        width: 120px;
        height: 120px;
      }
      .circle-sprite.p1 {
        top: -16px;
        right: 42px;
        width: 7em;
        height: 7em;
      }
      .circle-sprite.p2 {
        top: 20px;
        right: -10px;
        width: 5.5em;
        height: 5.5em;
      }
      .pair-name-primary {
        font-size: 0.75em;
        top: 10px;
      }
      .pair-name-secondary {
        font-size: 0.6em;
        bottom: 10px;
      }
      #pairs-container {
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       OVERLAY
       ============================================================ -->
  <div id="overlay" class="hidden">

    <!-- Loading State -->
    <div id="loading" class="active" role="status" aria-live="polite">
      <div class="loading-spinner" aria-hidden="true"></div>
      <div>Loading Nuzlocke...</div>
    </div>

    <!-- Error State -->
    <div id="error" role="alert" aria-live="assertive">
      <div>Error</div>
      <div id="errorMessage" style="font-size:0.6rem;margin-top:4px;"></div>
    </div>

    <!-- Empty State -->
    <div id="empty" role="status" aria-live="polite">
      <div>No pairings yet</div>
      <div style="font-size:0.55rem;margin-top:4px;opacity:0.5;">Add pairings to run.yaml to get started!</div>
    </div>

    <!-- Pairs Row (horizontal circles) -->
    <div id="pairs-container" style="display:none;"></div>

  </div>

  <script>
    // ============================================================
    //  Nuzlocke Overlay - OBS Browser Source
    //  Reads pairing data from one of these sources (priority order):
    //    1. localStorage key "nuzlocke-yaml" (set by index.html)
    //    2. /run.yaml (fallback for local dev)
    //
    //  @module overlay
    //  @requires PokeAPI (external sprite/type lookups)
    //  @note Designed for Chromium (OBS Embedded Browser)
    // ============================================================

    // ============================================================
    //  URL PARAMETERS
    //  @section config
    // ============================================================

    /** @const {URLSearchParams} Parsed query string */
    const urlParams = new URLSearchParams(window.location.search);

    /** @const {boolean} Global shiny override for all sprites */
    const SHINY = urlParams.get('shiny') === 'true';

    /** @const {boolean} Show female variant sprites */
    const FEMALE = urlParams.get('female') === 'true';

    /**
     * Generation mode for type lookups.
     * "gen6" (default) uses current PokeAPI types (Gen 6+).
     * "gen1-5" uses past_types from PokeAPI for pre-Gen-6 typing.
     * @const {'gen6'|'gen1-5'}
     */
    const GENERATION = urlParams.get('gen') === '1-5' ? 'gen1-5' : 'gen6';

    /**
     * PokeAPI artwork variant: "official-artwork" (default) or "home".
     * @const {'official-artwork'|'home'}
     */
    const ART_VARIANT = urlParams.get('art') === 'home' ? 'home' : 'official-artwork';

    // ============================================================
    //  GOOGLE FONT OVERRIDE
    //  @section fonts
    //
    //  Streamers can replace the default FLURO font with any Google
    //  Font by passing `?font=FontName` in the URL.
    //
    //  Examples:
    //    ?font=Press+Start+2P
    //    ?font=Rubik&font-weight=300;400;600;700
    //
    //  The font is loaded dynamically via a <link> tag injected into
    //  <head>. Once loaded, it becomes the primary font-family with
    //  FLURO as fallback.
    //
    //  @const {string|null} FONT_NAME - Google Font name (e.g. "Press+Start+2P")
    //  @const {string}      FONT_WEIGHTS - Semicolon-separated weights (default "400;600;700")
    // ============================================================

    /**
     * Google Font family name from the `?font=` URL parameter.
     * Spaces should be encoded as `+` (e.g. `?font=Press+Start+2P`).
     * If omitted, the default FLURO font is used.
     * @const {string|null}
     */
    const FONT_NAME = urlParams.get('font') || null;

    /**
     * Font weights to load from Google Fonts, semicolon-separated.
     * Only used when `?font=` is also specified.
     * Defaults to "400;600;700" (regular, semi-bold, bold).
     * @const {string}
     */
    const FONT_WEIGHTS = urlParams.get('font-weight') || '400;600;700';

    // ============================================================
    //  DOM REFS
    //  @section dom
    // ============================================================
    const overlayEl = document.getElementById('overlay');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const errorMessage = document.getElementById('errorMessage');
    const emptyEl = document.getElementById('empty');
    const pairsContainer = document.getElementById('pairs-container');

    // ============================================================
    //  SPRITE & TYPE LOOKUPS
    //  @section sprites
    // ============================================================

    /**
     * Base URL for PokeAPI official artwork sprites.
     * Dynamically built from ART_VARIANT.
     * @const {string}
     */
    const SPRITE_BASE =
      `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/${ART_VARIANT}`;

    /**
     * Cache for dex ID lookups: speciesName -> nationalDexId.
     * @type {Object<string, number>}
     */
    const dexCache = {};

    /**
     * Map of Pokemon type names to their hex colors.
     * Used for the diagonal gradient on pair circles.
     * @const {Object<string, string>}
     */
    const TYPE_COLORS = {
      normal: '#A8A77A', fire: '#EE8130', water: '#6390F0',
      electric: '#F7D02C', grass: '#7AC74C', ice: '#96D9D6',
      fighting: '#C22E28', poison: '#A33EA1', ground: '#E2BF65',
      flying: '#A98FF3', psychic: '#F95587', bug: '#A6B91A',
      rock: '#B6A136', ghost: '#735797', dragon: '#6F35FC',
      dark: '#705746', steel: '#B7B7CE', fairy: '#D685AD',
    };

    /**
     * Cache for type lookups: speciesName -> [primaryType, secondaryType|null].
     * @type {Object<string, [string|null, string|null]>}
     */
    const typeCache = {};

    /**
     * Normalize a Pokemon name for PokeAPI lookup.
     *
     * Handles common user-friendly inputs:
     *   - "Mr. Mime" -> "mr-mime" (removes periods)
     *   - "Galarian Mr. Mime" -> "mr-mime-galar" (moves region prefix to suffix)
     *   - "Alolan Raichu" -> "raichu-alola"
     *   - "Hisuian Zorua" -> "zorua-hisui"
     *   - "Paldean Wooper" -> "wooper-paldea"
     *   - "Farfetch'd" -> "farfetchd" (removes apostrophes)
     *   - "Flabébé" -> "flabebe" (strips diacritics)
     *   - "Type: Null" -> "type-null" (removes colons)
     *   - "Nidoran♀" -> "nidoran-f" (gender symbols)
     *
     * @param {string} name - Raw species name (lowercased, no "(Shiny)" suffix).
     * @returns {string} Normalized name ready for PokeAPI.
     */
    function normalizePokemonName(name) {
      let n = name.toLowerCase().trim();

      // Handle regional forms: "galarian mr. mime" -> "mr-mime-galar"
      const regionMap = {
        'galarian': 'galar',
        'alolan': 'alola',
        'hisuian': 'hisui',
        'paldean': 'paldea',
      };
      for (const [prefix, suffix] of Object.entries(regionMap)) {
        if (n.startsWith(prefix + ' ')) {
          n = n.slice(prefix.length).trim() + '-' + suffix;
          break;
        }
      }

      // Remove periods: "mr." -> "mr"
      n = n.replace(/\./g, '');

      // Remove apostrophes: "farfetch'd" -> "farfetchd"
      n = n.replace(/'/g, '');

      // Gender symbols: "♀" -> "-f", "♂" -> "-m"
      n = n.replace(/[♀]/g, '-f').replace(/[♂]/g, '-m');

      // Strip diacritics: "flabébé" -> "flabebe"
      n = n.normalize('NFD').replace(/[\u0300-\u036f]/g, '');

      // Replace colons with hyphens: "type: null" -> "type- null"
      n = n.replace(/:/g, '');

      // Replace spaces with hyphens
      n = n.replace(/\s+/g, '-');

      // Clean up double hyphens
      n = n.replace(/-+/g, '-');

      // Strip leading/trailing hyphens
      n = n.replace(/^-|-$/g, '');

      return n;
    }

    /**
     * Parse a species name, detecting an optional "(Shiny)" suffix
     * and normalizing the name for PokeAPI.
     *
     * @param {string} raw - Raw species string (e.g. "Piplup (Shiny)").
     * @returns {{ cleanName: string, isShiny: boolean }}
     *   - cleanName: lowercased, normalized species name with suffix stripped.
     *   - isShiny: true if "(Shiny)" was found.
     *
     * @example
     *   parseSpeciesName("Piplup (Shiny)") // -> { cleanName: "piplup", isShiny: true }
     *   parseSpeciesName("Mr. Mime")       // -> { cleanName: "mr-mime", isShiny: false }
     *   parseSpeciesName("Galarian Mr. Mime") // -> { cleanName: "mr-mime-galar", isShiny: false }
     */
    function parseSpeciesName(raw) {
      const trimmed = raw.trim();
      const match = trimmed.match(/^(.+?)\s*\(Shiny\)\s*$/i);
      let baseName;
      let isShiny;
      if (match) {
        baseName = match[1].toLowerCase().trim();
        isShiny = true;
      } else {
        baseName = trimmed.toLowerCase().trim();
        isShiny = false;
      }
      return { cleanName: normalizePokemonName(baseName), isShiny };
    }

    /**
     * Generation names used by PokeAPI's past_types.
     * @const {string[]}
     */
    const GEN_1_5_NAMES = [
      'generation-i', 'generation-ii', 'generation-iii',
      'generation-iv', 'generation-v',
    ];

    /**
     * Fetch both primary and secondary types for a Pokemon species from PokeAPI.
     * Results are cached in {@link typeCache} as [primary, secondary|null].
     *
     * When GENERATION is "gen1-5", this function checks the `past_types` array
     * on the PokeAPI response to find the type assignment from Gen 1-5.
     * For example, Clefairy was Normal-type before Gen 6, so with Gen 1-5 mode
     * it returns ["normal", null] instead of ["fairy", null].
     *
     * For solo Nuzlocke mode, the primary type is used as `c1` and the secondary
     * type (or primary if mono-type) is used as `c2` in the diagonal gradient,
     * giving the same visual treatment as Soul Link pairs.
     *
     * @param {string} speciesName - Species name (may include "(Shiny)" suffix).
     * @returns {Promise<[string|null, string|null]>}
     *   Tuple of [primaryTypeName, secondaryTypeName|null].
     *   - primaryTypeName: e.g. "water" - the first type slot.
     *   - secondaryTypeName: e.g. "flying" - the second type slot, or null if mono-type.
     */
    async function getPokemonTypes(speciesName) {
      const { cleanName } = parseSpeciesName(speciesName);
      if (typeCache[cleanName]) return typeCache[cleanName];
      try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${cleanName}`);
        if (!res.ok) return [null, null];
        const data = await res.json();

        let primary, secondary;

        if (GENERATION === 'gen1-5' && data.past_types && data.past_types.length > 0) {
          // Find the past_types entry for Gen 1-5
          const gen15Entry = data.past_types.find(entry =>
            GEN_1_5_NAMES.includes(entry.generation?.name)
          );
          if (gen15Entry && gen15Entry.types && gen15Entry.types.length > 0) {
            primary = gen15Entry.types[0]?.type?.name || null;
            secondary = gen15Entry.types[1]?.type?.name || null;
          } else {
            // Fall back to current types if no past_types match
            primary = data.types?.[0]?.type?.name || null;
            secondary = data.types?.[1]?.type?.name || null;
          }
        } else {
          // Default: use current types (Gen 6+)
          primary = data.types?.[0]?.type?.name || null;
          secondary = data.types?.[1]?.type?.name || null;
        }

        const result = [primary, secondary];
        typeCache[cleanName] = result;
        return result;
      } catch {
        return [null, null];
      }
    }

    /**
     * Fetch the National Pokedex ID for a species from PokeAPI.
     * Results are cached in {@link dexCache}.
     *
     * @param {string} speciesName - Species name (may include "(Shiny)" suffix).
     * @returns {Promise<number|null>} Dex ID or null on failure.
     */
    async function getDexId(speciesName) {
      const { cleanName } = parseSpeciesName(speciesName);
      if (dexCache[cleanName]) return dexCache[cleanName];
      try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${cleanName}`);
        if (!res.ok) return null;
        const data = await res.json();
        dexCache[cleanName] = data.id;
        return data.id;
      } catch {
        return null;
      }
    }

    /**
     * Build a PokeAPI sprite URL for a given Pokemon.
     *
     * Shiny priority (highest to lowest):
     *   1. perPokemonShiny (from "(Shiny)" suffix in run.yaml)
     *   2. global SHINY param (from URL ?shiny=true)
     *
     * @param {number|null} dexId - National Pokedex ID.
     * @param {boolean} perPokemonShiny - Per-Pokemon shiny flag from parser.
     * @param {boolean} female - Whether to request female variant.
     * @returns {string|null} Full sprite URL, or null if dexId is falsy.
     *
     * @note For "home" artwork variant, female variants are not available
     *   in the PokeAPI repository, so female is silently ignored.
     */
    function buildSpriteUrl(dexId, perPokemonShiny, female) {
      if (!dexId) return null;

      const useShiny = perPokemonShiny || SHINY;
      const useFemale = female && ART_VARIANT !== 'home';

      let path = `${SPRITE_BASE}/`;
      if (useShiny && useFemale) path += `shiny/female/${dexId}.png`;
      else if (useShiny) path += `shiny/${dexId}.png`;
      else if (useFemale) path += `female/${dexId}.png`;
      else path += `${dexId}.png`;
      return path;
    }

    // ============================================================
    //  RUN.YAML PARSER
    //  @section parser
    // ============================================================

    /**
     * Advance the line index past any blank lines.
     *
     * @param {string[]} lines - Array of raw text lines.
     * @param {number} i - Current index (will be mutated).
     * @returns {number} New index after skipping blanks, or lines.length if EOF.
     * @private
     */
    function skipBlankLines(lines, i) {
      while (i < lines.length && lines[i].trim() === '') i++;
      return i;
    }

    /**
     * Parse the .yaml format into structured pairing data.
     *
     * The `.yaml` file format supports comment lines. Lines starting with `#` are
     * stripped before parsing, allowing streamers to comment out dead
     * pairs, add notes, or temporarily disable routes without deleting
     * them from the file.
     *
     * Supports two modes, auto-detected per route:
     *
     * **Solo Nuzlocke** (one Pokemon per route - species line has NO `&`):
     * ```
     * - Route 201
     * Nightfall
     * Piplup (Shiny)
     * ```
     *
     * **Soul Link** (two Pokemon per route - species line contains `&`):
     * ```
     * - Route 201
     * Nightfall & Daybreak
     * Piplup & Piplup
     * ```
     *
     * Rules:
     * - Lines starting with "- ": Route/pairing header.
     *   - If header ends with `(DEAD)` or `(BOX)`, the entire pairing is skipped.
     * - Next non-blank line: Nicknames (single for Solo, P1 & P2 for Soul Link).
     * - Next non-blank line: Species (single for Solo, P1 & P2 for Soul Link).
     *   - Species may end with `(Shiny)` to flag shiny sprite.
     * - Blank lines are ignored.
     *
     * @param {string} text - Raw content of run.yaml.
     * @returns {{ pairs: Array<Object> }}
     *   Parsed data ready for rendering.
     *   Each pair object has:
     *   - `isSolo` {boolean} - true if this route has only one Pokemon
     *   - `p1` {Object} - always populated (the single Pokemon in solo mode)
     *   - `p2` {Object|null} - null in solo mode, populated in Soul Link mode
     */
    function parseRunTxt(text) {
      // Strip comment lines (lines starting with #) before parsing.
      const rawLines = text.split('\n');
      const lines = rawLines.filter(line => !line.trim().startsWith('#'));

      const pairs = [];
      let i = 0;

      while (i < lines.length) {
        const line = lines[i].trim();

        if (line.startsWith('- ')) {
          // --- Route header ---
          const routePart = line.slice(2).trim();

          // Check for skip markers
          const upper = routePart.toUpperCase();
          const isSkipped = upper.endsWith('(DEAD)') || upper.endsWith('(BOX)');

          // Extract clean route name (strip the marker)
          let routeName = routePart;
          routeName = routeName.replace(/\s*\(DEAD\)\s*$/i, '').trim();
          routeName = routeName.replace(/\s*\(BOX\)\s*$/i, '').trim();

          // --- Nicknames ---
          i = skipBlankLines(lines, i + 1);
          if (i >= lines.length) break;
          const nicknameLine = lines[i].trim();

          // --- Species ---
          i = skipBlankLines(lines, i + 1);
          if (i >= lines.length) break;
          const speciesLine = lines[i].trim();

          if (isSkipped) {
            i++;
            continue;
          }

          // --- Auto-detect mode from species line ---
          // If the species line contains "&", it's a Soul Link pair (two Pokemon).
          // Otherwise, it's a Solo Nuzlocke (one Pokemon).
          const isSolo = !speciesLine.includes('&');

          if (isSolo) {
            // Solo Nuzlocke mode
            // Single nickname, single species.
            const nickname = nicknameLine.trim();
            const parsed = parseSpeciesName(speciesLine);

            pairs.push({
              originKey: routeName.toLowerCase().replace(/\s+/g, '-'),
              routeName: routeName,
              isSolo: true,
              p1: {
                nickname: nickname,
                name: parsed.cleanName,
                rawName: speciesLine.trim(),
                shiny: parsed.isShiny,
                events: {},
              },
              p2: null,
            });
          } else {
            // Soul Link mode (two Pokemon)
            // Parse "Nick1 & Nick2"
            const nickParts = nicknameLine.split('&').map(s => s.trim());
            const nick1 = nickParts[0] || '';
            const nick2 = nickParts[1] || '';

            // Parse "Species1 & Species2" with (Shiny) detection
            const specParts = speciesLine.split('&').map(s => s.trim());
            const rawSpec1 = specParts[0] || '';
            const rawSpec2 = specParts[1] || '';

            const parsed1 = parseSpeciesName(rawSpec1);
            const parsed2 = parseSpeciesName(rawSpec2);

            pairs.push({
              originKey: routeName.toLowerCase().replace(/\s+/g, '-'),
              routeName: routeName,
              isSolo: false,
              p1: {
                nickname: nick1,
                name: parsed1.cleanName,
                rawName: rawSpec1,
                shiny: parsed1.isShiny,
                events: {},
              },
              p2: {
                nickname: nick2,
                name: parsed2.cleanName,
                rawName: rawSpec2,
                shiny: parsed2.isShiny,
                events: {},
              },
            });
          }
        }

        i++;
      }

      return { pairs };
    }

    // ============================================================
    //  DATA SOURCE - localStorage or /run.yaml fallback
    //  @section loader
    //
    //  Priority:
    //    1. localStorage key "nuzlocke-yaml" (set by index.html)
    //    2. /run.yaml (fallback for local dev)
    // ============================================================

    /** @const {string} localStorage key shared with index.html */
    const STORAGE_KEY = 'nuzlocke-yaml';

    /**
     * Cached JSON of the last rendered pairs for change detection.
     * @type {string}
     */
    let lastPairsJson = '';

    /** @type {number|null} setInterval ID for polling */
    let refreshInterval = null;

    /**
     * Polling interval in milliseconds.
     * @const {number}
     */
    const POLL_INTERVAL_MS = 3000;

    /**
     * Try to load YAML from localStorage (set by index.html).
     * @returns {string|null} YAML text or null if not found/empty.
     */
    function loadFromLocalStorage() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved && saved.trim()) return saved.trim();
      } catch (e) {
        console.warn('[Overlay] localStorage not available:', e.message);
      }
      return null;
    }

    /**
     * Parse YAML text and render the overlay.
     *
     * @param {string} text - Raw YAML content.
     * @param {string} source - Label for the data source (for logging).
     * @returns {Promise<boolean>} True if rendered successfully.
     */
    async function parseAndRender(text, source) {
      if (!text.trim()) {
        showError('YAML data is empty');
        return false;
      }

      const parsed = parseRunTxt(text);

      // Content-based change detection
      const newJson = JSON.stringify(parsed.pairs);
      if (newJson === lastPairsJson) return false;

      lastPairsJson = newJson;

      console.log(`[Overlay] Rendering from ${source} (${parsed.pairs.length} pairs)`);

      // --- Render ---
      await renderPairs(parsed.pairs);

      hideAllStates();
      if (parsed.pairs.length === 0) {
        showEmpty();
      } else {
        pairsContainer.style.display = 'flex';
      }

      return true;
    }

    /**
     * Main load function - tries sources in priority order.
     *
     * Priority:
     *   1. localStorage key "nuzlocke-yaml" (set by index.html)
     *   2. /run.yaml (fallback for local dev)
     *
     * @returns {Promise<void>}
     */
    async function loadFromRunTxt() {
      try {
        // Priority 1: localStorage
        const lsYaml = loadFromLocalStorage();
        if (lsYaml) {
          await parseAndRender(lsYaml, 'localStorage');
          return;
        }

        // Priority 2: /run.yaml fallback
        const res = await fetch('/run.yaml');

        if (!res.ok) {
          showError(`Failed to load run.yaml (HTTP ${res.status})`);
          return;
        }

        const text = await res.text();
        await parseAndRender(text, '/run.yaml');

      } catch (err) {
        console.error('[Overlay] Error loading data:', err);
        showError(err.message || 'Failed to load data');
      }
    }

    // ============================================================
    //  RENDER - horizontal circles
    //  Supports both Soul Link (two Pokemon) and Solo Nuzlocke
    //  (one Pokemon) modes, auto-detected per route.
    // ============================================================
    async function renderPairs(pairs) {
      pairsContainer.innerHTML = '';
      if (pairs.length === 0) return;

      // Batch resolve dex IDs and type colors.
      const dexPromises = [];
      const typePromises = [];
      for (const pair of pairs) {
        const name1 = pair.p1 ? pair.p1.name : null;
        const name2 = pair.p2 ? pair.p2.name : null;
        dexPromises.push(name1 ? getDexId(name1) : Promise.resolve(null));
        dexPromises.push(name2 ? getDexId(name2) : Promise.resolve(null));
        typePromises.push(name1 ? getPokemonTypes(name1) : Promise.resolve([null, null]));
        typePromises.push(name2 ? getPokemonTypes(name2) : Promise.resolve([null, null]));
      }

      const dexResults = await Promise.all(dexPromises);
      const typeResults = await Promise.all(typePromises);

      for (let i = 0; i < pairs.length; i++) {
        const pair = pairs[i];
        const dex1 = dexResults[i * 2];
        const dex2 = dexResults[i * 2 + 1];
        const types1 = typeResults[i * 2];
        const types2 = typeResults[i * 2 + 1];

        // Build gradient from types
        const c1 = types1[0] ? (TYPE_COLORS[types1[0]] || '#888') : '#888';
        const c2 = pair.isSolo
          ? (types1[1] ? (TYPE_COLORS[types1[1]] || '#888') : c1)
          : (types2[0] ? (TYPE_COLORS[types2[0]] || '#888') : '#888');

        // Create circle
        const circle = document.createElement('div');
        circle.className = 'pair-circle';
        circle.style.background = `linear-gradient(135deg, ${c1}88 0%, transparent 50%, ${c2}88 100%)`;
        circle.style.backdropFilter = 'blur(16px)';
        circle.style.webkitBackdropFilter = 'blur(16px)';

        // Route name tooltip
        circle.title = pair.routeName;

        if (pair.isSolo) {
          // --- Solo Nuzlocke rendering ---
          const sprite = document.createElement('img');
          sprite.className = 'circle-sprite solo';
          sprite.alt = pair.p1.name;
          const url = buildSpriteUrl(dex1, pair.p1.shiny, FEMALE);
          if (url) sprite.src = url;
          sprite.loading = 'lazy';
          circle.appendChild(sprite);

          const nameEl = document.createElement('div');
          nameEl.className = 'pair-name-solo';
          nameEl.textContent = pair.p1.nickname || pair.p1.name;
          circle.appendChild(nameEl);

        } else {
          // --- Soul Link rendering ---
          const sprite1 = document.createElement('img');
          sprite1.className = 'circle-sprite p1';
          sprite1.alt = pair.p1.name;
          const url1 = buildSpriteUrl(dex1, pair.p1.shiny, FEMALE);
          if (url1) sprite1.src = url1;
          sprite1.loading = 'lazy';
          circle.appendChild(sprite1);

          const sprite2 = document.createElement('img');
          sprite2.className = 'circle-sprite p2';
          sprite2.alt = pair.p2.name;
          const url2 = buildSpriteUrl(dex2, pair.p2.shiny, FEMALE);
          if (url2) sprite2.src = url2;
          sprite2.loading = 'lazy';
          circle.appendChild(sprite2);

          const name1El = document.createElement('div');
          name1El.className = 'pair-name-primary';
          name1El.textContent = pair.p1.nickname || pair.p1.name;
          circle.appendChild(name1El);

          const name2El = document.createElement('div');
          name2El.className = 'pair-name-secondary';
          name2El.textContent = pair.p2.nickname || pair.p2.name;
          circle.appendChild(name2El);
        }

        pairsContainer.appendChild(circle);
      }
    }

    // ============================================================
    //  UI STATE HELPERS
    // ============================================================

    /** Hide all state overlays. */
    function hideAllStates() {
      loadingEl.classList.remove('active');
      errorEl.classList.remove('active');
      emptyEl.classList.remove('active');
      pairsContainer.style.display = 'none';
    }

    /** Show loading state. */
    function showLoading() {
      hideAllStates();
      loadingEl.classList.add('active');
    }

    /**
     * Show error state with a message.
     * @param {string} msg - Error description.
     */
    function showError(msg) {
      hideAllStates();
      errorEl.classList.add('active');
      errorMessage.textContent = msg;
    }

    /** Show empty state (no pairings found). */
    function showEmpty() {
      hideAllStates();
      emptyEl.classList.add('active');
    }

    // ============================================================
    //  GOOGLE FONT LOADER
    //  @section fonts
    //
    //  If `?font=FontName` is specified in the URL, inject a <link>
    //  tag into <head> to load the font from Google Fonts.
    //  Once loaded, update the CSS custom property.
    // ============================================================

    /**
     * Load a Google Font dynamically by injecting a <link> tag.
     * Falls back to FLURO if the font fails to load.
     *
     * @param {string} fontName - Google Font family name (e.g. "Press+Start+2P").
     * @param {string} weights - Semicolon-separated font weights (e.g. "400;600;700").
     * @returns {Promise<void>} Resolves when the font has loaded (or failed).
     */
    function loadGoogleFont(fontName, weights) {
      return new Promise((resolve) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(fontName.replace(/\+/g, ' '))}:wght@${weights}&display=swap`;
        link.onload = () => {
          document.documentElement.style.setProperty('--overlay-font', `'${fontName.replace(/\+/g, ' ')}', 'FLURO', sans-serif`);
          resolve();
        };
        link.onerror = () => {
          console.warn(`[Overlay] Failed to load font "${fontName}", using FLURO fallback`);
          resolve();
        };
        document.head.appendChild(link);
      });
    }

    // ============================================================
    //  POLLING - auto-refresh for live editing
    //  @section polling
    //
    //  Polls localStorage every POLL_INTERVAL_MS for changes.
    //  This allows the overlay to update live when the user edits
    //  the YAML in index.html without needing to refresh OBS.
    // ============================================================

    /**
     * Start polling for data changes.
     * Checks localStorage first, then falls back to /run.yaml.
     */
    function startPolling() {
      if (refreshInterval) clearInterval(refreshInterval);

      refreshInterval = setInterval(async () => {
        try {
          const lsYaml = loadFromLocalStorage();
          if (lsYaml) {
            await parseAndRender(lsYaml, 'localStorage');
          } else {
            // Fallback: re-fetch /run.yaml
            const res = await fetch('/run.yaml');
            if (res.ok) {
              const text = await res.text();
              await parseAndRender(text, '/run.yaml');
            }
          }
        } catch (e) {
          // Silently ignore polling errors to avoid console spam in OBS
        }
      }, POLL_INTERVAL_MS);
    }

    // ============================================================
    //  INIT
    //  @section init
    // ============================================================

    (async function init() {
      showLoading();

      // Load Google Font if specified
      if (FONT_NAME) {
        await loadGoogleFont(FONT_NAME, FONT_WEIGHTS);
      }

      // Initial load
      await loadFromRunTxt();

      // Show overlay with fade-in
      overlayEl.classList.remove('hidden');

      // Start polling for live updates
      startPolling();
    })();
  </script>
