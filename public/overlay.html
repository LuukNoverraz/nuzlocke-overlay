<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soul Link Overlay</title>

  <style>
    /* ============================================================
       RESET & BASE
       ============================================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
      font-family: 'FLURO', 'Segoe UI', sans-serif;
      color: #f0f4f8;
    }

    /* ============================================================
       FLURO FONTS
       ============================================================ */
    @font-face {
      font-family: 'FLURO';
      src: url('/fonts/KAZER-STUDIO-FLURO.OTF') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'FLURO';
      src: url('/fonts/KAZER-STUDIO-FLURO-BOLD.OTF') format('opentype');
      font-weight: bold;
      font-style: normal;
    }
    @font-face {
      font-family: 'FLURO';
      src: url('/fonts/KAZER-STUDIO-FLURO-LIGHT.OTF') format('opentype');
      font-weight: 300;
      font-style: normal;
    }
    @font-face {
      font-family: 'FLURO';
      src: url('/fonts/KAZER-STUDIO-FLURO-SEMIBOLD.OTF') format('opentype');
      font-weight: 600;
      font-style: normal;
    }

    /* ============================================================
       OVERLAY CONTAINER — fully transparent, full-width
       ============================================================ */
    #overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100vw;
      background: transparent !important;
      padding: 0 16px 12px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    #overlay.hidden {
      opacity: 0;
    }

    /* ============================================================
       HEADER — minimal, transparent
       ============================================================ */
    #header {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 4px 0 8px 0;
      flex-shrink: 0;
      pointer-events: auto;
    }

    #header .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px rgba(74, 222, 128, 0.5);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    #header .status-dot.error {
      background: #f87171;
      box-shadow: 0 0 6px rgba(248, 113, 113, 0.5);
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.85); }
    }

    #header .title-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #header h1 {
      font-family: 'FLURO', sans-serif;
      font-weight: bold;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.7);
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.08);
    }

    #header .run-id {
      font-family: 'FLURO', sans-serif;
      font-weight: 300;
      font-size: 0.6rem;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 0.05em;
    }

    /* ============================================================
       PAIRS ROW — horizontal scroll of circles
       ============================================================ */
    #pairs-container {
      width: 100%;
      max-width: 100vw;
      overflow-x: auto;
      overflow-y: hidden;
      padding-top: 2em;
      padding-bottom: 2em;
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 16px;
      transform: scale(1.5) translate(0px, -4em);
      pointer-events: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    #pairs-container::-webkit-scrollbar {
      display: none;
    }

    /* ============================================================
       PAIR CIRCLE — the "O" containing a duo
       ============================================================ */
    .pair-circle {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: visible;
      cursor: default;
      clip-path: none;
      -webkit-clip-path: none;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.52) 0%,
        rgba(255, 255, 255, 0.04) 50%,
        rgba(255, 255, 255, 0.60) 100%
      );
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.25s ease;
    }

    .pair-circle::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(
        135deg,
        transparent 25%,
        rgba(255, 255, 255, 0.08) 40%,
        rgba(255, 255, 255, 0.14) 50%,
        rgba(255, 255, 255, 0.08) 60%,
        transparent 75%
      );
      pointer-events: none;
      z-index: 0;
    }

    .pair-circle:hover {
      border-color: rgba(255, 255, 255, 0.12);
      filter: brightness(1.15);
    }

    .pair-circle.dead {
      border-color: rgba(248, 113, 113, 0.15);
      background: linear-gradient(
        135deg,
        rgba(40, 20, 25, 0.75) 0%,
        rgba(40, 20, 25, 0.75) 65%,
        rgba(55, 25, 30, 0.75) 65%,
        rgba(55, 25, 30, 0.75) 100%
      );
    }

    .pair-circle.dead:hover {
      border-color: rgba(248, 113, 113, 0.25);
    }

    /* ============================================================
       ROUTE NAME inside circle
       ============================================================ */
    .pair-route {
      display: none;
    }

    /* ============================================================
       POKEMON NAMES inside circle — top & bottom
       ============================================================ */
    .pair-name-primary {
      font-family: 'FLURO', sans-serif;
      font-weight: 600;
      font-size: 1em;
      color: #f0f4f8;
      letter-spacing: 0.03em;
      text-align: center;
      position: absolute;
      top: 0px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      z-index: 3;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.25),
        0 0 20px rgba(255, 255, 255, 0.08),
        0 1px 4px rgba(0, 0, 0, 1);
    }

    .pair-name-primary.dead {
      color: rgba(248, 113, 113, 0.7);
    }

    .pair-name-secondary {
      font-family: 'FLURO', sans-serif;
      font-weight: 600;
      font-size: 0.8em;
      color: #f0f4f8;
      letter-spacing: 0.03em;
      text-align: center;
      position: absolute;
      bottom: 0px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      z-index: 3;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.25),
        0 0 20px rgba(255, 255, 255, 0.08),
        0 1px 4px rgba(0, 0, 0, 1);
    }

    .pair-name-secondary.dead {
      color: rgba(248, 113, 113, 0.7);
    }

    /* ============================================================
       SPRITES inside circle — stacked diagonally
       ============================================================ */
    .circle-sprite {
      position: absolute;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: filter 0.3s ease;
      z-index: 1;
    }

    .circle-sprite.p1 {
      top: 8px;
      right: 64px;
      width: 7em;
      height: 7em;
    }

    .circle-sprite.p2 {
      top: 40px;
      right: -8px;
      width: 7em;
      height: 7em;
      z-index: 2;
      transform: scaleX(-1);
    }

    .circle-sprite.dead {
      filter: grayscale(1) brightness(0.35);
    }

    /* ============================================================
       EMPTY / LOADING / ERROR STATES
       ============================================================ */
    #loading,
    #error,
    #empty {
      display: none;
      text-align: center;
      padding: 20px 20px;
      font-family: 'FLURO', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
      pointer-events: auto;
    }

    #loading.active,
    #error.active,
    #empty.active {
      display: block;
    }

    #error.active {
      color: rgba(248, 113, 113, 0.6);
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.08);
      border-top-color: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ============================================================
       ADMIN PANEL
       ============================================================ */
    #admin-panel {
      display: none;
      flex-shrink: 0;
      padding-top: 6px;
      margin-top: 4px;
      pointer-events: auto;
    }

    #admin-panel.active {
      display: block;
    }

    #admin-panel .admin-label {
      font-family: 'FLURO', sans-serif;
      font-weight: 300;
      font-size: 0.5rem;
      color: rgba(251, 191, 36, 0.35);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
      text-align: center;
    }

    .admin-swap-btn {
      font-family: 'FLURO', sans-serif;
      font-weight: 600;
      font-size: 0.5rem;
      padding: 2px 8px;
      border-radius: 6px;
      border: 1px solid rgba(251, 191, 36, 0.2);
      background: rgba(251, 191, 36, 0.06);
      color: rgba(251, 191, 36, 0.6);
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .admin-swap-btn:hover {
      background: rgba(251, 191, 36, 0.12);
      border-color: rgba(251, 191, 36, 0.35);
      color: #fbbf24;
    }

    .admin-swap-btn:active {
      transform: scale(0.95);
    }

    .admin-swap-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 768px) {
      .pair-circle {
        width: 140px;
        height: 140px;
      }
      .circle-sprite.p1 {
        top: -20px;
        right: 50px;
        width: 8em;
        height: 8em;
      }
      .circle-sprite.p2 {
        top: 24px;
        right: -14px;
        width: 6.5em;
        height: 6.5em;
      }
      .pair-name-primary {
        font-size: 0.85em;
        top: 12px;
      }
      .pair-name-secondary {
        font-size: 0.7em;
        bottom: 12px;
      }
    }

    @media (max-width: 480px) {
      .pair-circle {
        width: 120px;
        height: 120px;
      }
      .circle-sprite.p1 {
        top: -16px;
        right: 42px;
        width: 7em;
        height: 7em;
      }
      .circle-sprite.p2 {
        top: 20px;
        right: -10px;
        width: 5.5em;
        height: 5.5em;
      }
      .pair-name-primary {
        font-size: 0.75em;
        top: 10px;
      }
      .pair-name-secondary {
        font-size: 0.6em;
        bottom: 10px;
      }
      #pairs-container {
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       OVERLAY
       ============================================================ -->
  <div id="overlay" class="hidden">

    <!-- Header -->
    <div id="header">
      <span class="status-dot" id="statusDot"></span>
      <div class="title-group">
        <h1>SOUL LINK</h1>
        <span class="run-id" id="runIdDisplay"></span>
      </div>
    </div>

    <!-- Loading State -->
    <div id="loading" class="active">
      <div class="loading-spinner"></div>
      <div>Loading Soul Link...</div>
    </div>

    <!-- Error State -->
    <div id="error">
      <div>⚠ Error</div>
      <div id="errorMessage" style="font-size:0.6rem;margin-top:4px;"></div>
    </div>

    <!-- Empty State -->
    <div id="empty">
      <div>No Soul Link pairs yet</div>
      <div style="font-size:0.55rem;margin-top:4px;opacity:0.5;">Add pairings to run.txt to get started!</div>
    </div>

    <!-- Pairs Row (horizontal circles) -->
    <div id="pairs-container" style="display:none;"></div>

    <!-- Admin Panel -->
    <div id="admin-panel">
      <div class="admin-label">⚙ Admin — Click to simulate a swap</div>
      <div id="admin-buttons" style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;"></div>
    </div>

  </div>

  <script>
    // ============================================================
    //  URL PARAMETERS
    // ============================================================
    const urlParams = new URLSearchParams(window.location.search);
    // The query param is the slug itself (e.g. ?attempt4)
    const QUERY_SLUG = window.location.search.replace(/^\?/, '').trim();
    const IS_ADMIN = urlParams.get('admin') === 'true';
    const SHINY = urlParams.get('shiny') === 'true';
    const FEMALE = urlParams.get('female') === 'true';

    // ============================================================
    //  DOM REFS
    // ============================================================
    const overlayEl = document.getElementById('overlay');
    const statusDot = document.getElementById('statusDot');
    const runIdDisplay = document.getElementById('runIdDisplay');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const errorMessage = document.getElementById('errorMessage');
    const emptyEl = document.getElementById('empty');
    const pairsContainer = document.getElementById('pairs-container');
    const adminPanel = document.getElementById('admin-panel');
    const adminButtons = document.getElementById('admin-buttons');

    // ============================================================
    //  SPRITE URL BUILDER
    // ============================================================
    const SPRITE_BASE =
      'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork';

    const dexCache = {};

    const TYPE_COLORS = {
      normal: '#A8A77A', fire: '#EE8130', water: '#6390F0',
      electric: '#F7D02C', grass: '#7AC74C', ice: '#96D9D6',
      fighting: '#C22E28', poison: '#A33EA1', ground: '#E2BF65',
      flying: '#A98FF3', psychic: '#F95587', bug: '#A6B91A',
      rock: '#B6A136', ghost: '#735797', dragon: '#6F35FC',
      dark: '#705746', steel: '#B7B7CE', fairy: '#D685AD',
    };

    const typeCache = {};

    async function getPrimaryType(speciesName) {
      const name = speciesName.toLowerCase().trim();
      if (typeCache[name]) return typeCache[name];
      try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        if (!res.ok) return null;
        const data = await res.json();
        const typeName = data.types?.[0]?.type?.name || null;
        typeCache[name] = typeName;
        return typeName;
      } catch {
        return null;
      }
    }

    async function getDexId(speciesName) {
      const name = speciesName.toLowerCase().trim();
      if (dexCache[name]) return dexCache[name];
      try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        if (!res.ok) return null;
        const data = await res.json();
        dexCache[name] = data.id;
        return data.id;
      } catch {
        return null;
      }
    }

    function buildSpriteUrl(dexId, shiny, female) {
      if (!dexId) return null;
      let path = `${SPRITE_BASE}/`;
      if (shiny && female) path += `shiny/female/${dexId}.png`;
      else if (shiny) path += `shiny/${dexId}.png`;
      else if (female) path += `female/${dexId}.png`;
      else path += `${dexId}.png`;
      return path;
    }

    // ============================================================
    //  RUN.TXT PARSER
    // ============================================================

    /**
     * Parse the run.txt format:
     *
     * Line 1: Title (e.g. "ATTEMPT 4") → slug = "attempt4"
     * Blank lines are ignored.
     * Lines starting with "- " are route headers.
     *   If the route header ends with (DEAD) or (BOX), skip the entire pairing.
     * The next non-blank line after a route header = nicknames (P1 & P2)
     * The next non-blank line after that = species (P1 & P2)
     */
    function parseRunTxt(text) {
      const lines = text.split('\n');

      // Line 1 = title
      const title = (lines[0] || '').trim();
      const slug = title.toLowerCase().replace(/\s+/g, '');

      const pairs = [];
      let i = 1; // skip title line

      while (i < lines.length) {
        const line = lines[i].trim();

        if (line.startsWith('- ')) {
          // Route header
          const routePart = line.slice(2).trim();

          // Check for skip markers
          const upper = routePart.toUpperCase();
          const isSkipped = upper.endsWith('(DEAD)') || upper.endsWith('(BOX)');

          // Extract clean route name (strip the marker)
          let routeName = routePart;
          routeName = routeName.replace(/\s*\(DEAD\)\s*$/i, '').trim();
          routeName = routeName.replace(/\s*\(BOX\)\s*$/i, '').trim();

          // Find next non-blank line for nicknames
          i++;
          while (i < lines.length && lines[i].trim() === '') i++;
          if (i >= lines.length) break;
          const nicknameLine = lines[i].trim();

          // Find next non-blank line for species
          i++;
          while (i < lines.length && lines[i].trim() === '') i++;
          if (i >= lines.length) break;
          const speciesLine = lines[i].trim();

          if (isSkipped) {
            i++;
            continue;
          }

          // Parse "Nick1 & Nick2"
          const nickParts = nicknameLine.split('&').map(s => s.trim());
          const nick1 = nickParts[0] || '';
          const nick2 = nickParts[1] || '';

          // Parse "Species1 & Species2"
          const specParts = speciesLine.split('&').map(s => s.trim());
          const spec1 = specParts[0] || '';
          const spec2 = specParts[1] || '';

          pairs.push({
            originKey: routeName.toLowerCase().replace(/\s+/g, '-'),
            routeName: routeName,
            p1: { nickname: nick1, name: spec1, events: {} },
            p2: { nickname: nick2, name: spec2, events: {} },
            swappedAt: null,
          });
        }

        i++;
      }

      return { title, slug, pairs };
    }

    // ============================================================
    //  FETCH & LOAD FROM RUN.TXT
    // ============================================================
    let lastPairsJson = ''; // for change detection
    let refreshInterval = null;

    async function loadFromRunTxt() {
      try {
        const res = await fetch('/run.txt');
        if (!res.ok) {
          showError(`Failed to load run.txt (HTTP ${res.status})`);
          return;
        }
        const text = await res.text();

        if (!text.trim()) {
          showError('run.txt is empty');
          return;
        }

        const parsed = parseRunTxt(text);

        // Validate slug against query param (if one was provided)
        if (QUERY_SLUG && QUERY_SLUG !== parsed.slug && !QUERY_SLUG.startsWith('run=')) {
          // Show a warning but still render
          console.warn(`[Overlay] Query slug "${QUERY_SLUG}" doesn't match file title slug "${parsed.slug}"`);
        }

        // Update header
        runIdDisplay.textContent = parsed.title;

        // Change detection: only re-render if data actually changed
        const newJson = JSON.stringify(parsed.pairs);
        if (newJson === lastPairsJson) return; // no change

        lastPairsJson = newJson;

        // Render
        await renderPairs(parsed.pairs);
        setupAdminPanel(parsed.pairs);

        hideAllStates();
        if (parsed.pairs.length === 0) {
          showEmpty();
        } else {
          pairsContainer.style.display = 'flex';
        }

        statusDot.className = 'status-dot';

      } catch (err) {
        console.error('[Overlay] Error loading run.txt:', err);
        showError(err.message || 'Failed to load run.txt');
      }
    }

    // ============================================================
    //  RENDER — horizontal circles
    // ============================================================
    async function renderPairs(pairs) {
      pairsContainer.innerHTML = '';
      if (pairs.length === 0) return;

      // Batch resolve dex IDs and type colors
      const dexPromises = [];
      const typePromises = [];
      for (const pair of pairs) {
        const name1 = pair.p1 ? pair.p1.name : null;
        const name2 = pair.p2 ? pair.p2.name : null;
        dexPromises.push(name1 ? getDexId(name1) : Promise.resolve(null));
        dexPromises.push(name2 ? getDexId(name2) : Promise.resolve(null));
        typePromises.push(name1 ? getPrimaryType(name1) : Promise.resolve(null));
        typePromises.push(name2 ? getPrimaryType(name2) : Promise.resolve(null));
      }
      const dexIds = await Promise.all(dexPromises);
      const typeNames = await Promise.all(typePromises);

      pairs.forEach((pair, idx) => {
        const dexId1 = dexIds[idx * 2];
        const dexId2 = dexIds[idx * 2 + 1];
        const type1 = typeNames[idx * 2];
        const type2 = typeNames[idx * 2 + 1];

        const isSwapped = !!pair.swappedAt;

        // Build the circle
        const circle = document.createElement('div');
        circle.className = 'pair-circle';
        if (isSwapped) circle.classList.add('swapped');
        circle.dataset.origin = pair.originKey;

        // Apply type-colored diagonal gradient
        const c1 = TYPE_COLORS[type1] || 'rgba(255,255,255,0.08)';
        const c2 = TYPE_COLORS[type2] || 'rgba(255,255,255,0.08)';
        circle.style.background = `
          linear-gradient(135deg,
            rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 50%,
            rgba(255,255,255,0.18) 100%
          ),
          linear-gradient(135deg,
            ${c1}AA 0%, ${c1}66 40%,
            ${c2}66 60%, ${c2}AA 100%
          )
        `;

        // Route name (hidden, used for data)
        const routeEl = document.createElement('span');
        routeEl.className = 'pair-route';
        routeEl.textContent = pair.routeName;
        circle.appendChild(routeEl);

        // Sprite 1 (player 1)
        if (pair.p1) {
          const spriteUrl1 = buildSpriteUrl(dexId1, SHINY, FEMALE);
          if (spriteUrl1) {
            const img1 = document.createElement('img');
            img1.className = 'circle-sprite p1';
            img1.src = spriteUrl1;
            img1.alt = pair.p1.name || 'pokemon';
            img1.loading = 'lazy';
            img1.onerror = function() { this.style.display = 'none'; };
            circle.appendChild(img1);
          }
        }

        // Sprite 2 (player 2)
        if (pair.p2) {
          const spriteUrl2 = buildSpriteUrl(dexId2, SHINY, FEMALE);
          if (spriteUrl2) {
            const img2 = document.createElement('img');
            img2.className = 'circle-sprite p2';
            img2.src = spriteUrl2;
            img2.alt = pair.p2.name || 'pokemon';
            img2.loading = 'lazy';
            img2.onerror = function() { this.style.display = 'none'; };
            circle.appendChild(img2);
          }
        }

        // Names
        const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
        const name1 = pair.p1 ? cap(pair.p1.nickname || pair.p1.name || '?') : '—';
        const name2 = pair.p2 ? cap(pair.p2.nickname || pair.p2.name || '?') : '—';

        const primaryName = document.createElement('span');
        primaryName.className = 'pair-name-primary';
        primaryName.textContent = name1;
        circle.appendChild(primaryName);

        const secondaryName = document.createElement('span');
        secondaryName.className = 'pair-name-secondary';
        secondaryName.textContent = `& ${name2}`;
        circle.appendChild(secondaryName);

        pairsContainer.appendChild(circle);
      });
    }

    // ============================================================
    //  ADMIN PANEL
    // ============================================================
    function setupAdminPanel(pairs) {
      if (!IS_ADMIN) {
        adminPanel.classList.remove('active');
        return;
      }
      adminPanel.classList.add('active');
      adminButtons.innerHTML = '';

      for (const pair of pairs) {
        const btn = document.createElement('button');
        btn.className = 'admin-swap-btn';
        btn.textContent = `⤾ ${pair.routeName}`;
        btn.dataset.origin = pair.originKey;

        btn.addEventListener('click', () => {
          // Toggle swap state locally (no Firebase needed)
          const wasSwapped = !!pair.swappedAt;
          pair.swappedAt = wasSwapped ? null : Date.now();

          // Re-render just this circle
          loadFromRunTxt();

          btn.textContent = wasSwapped ? `⤾ ${pair.routeName}` : '⤾ Swapped!';
          setTimeout(() => {
            btn.textContent = `⤾ ${pair.routeName}`;
          }, 2000);
        });

        adminButtons.appendChild(btn);
      }
    }

    // ============================================================
    //  UI HELPERS
    // ============================================================
    function showLoading() {
      loadingEl.classList.add('active');
      errorEl.classList.remove('active');
      emptyEl.classList.remove('active');
      pairsContainer.style.display = 'none';
    }

    function showError(msg) {
      loadingEl.classList.remove('active');
      errorEl.classList.add('active');
      emptyEl.classList.remove('active');
      pairsContainer.style.display = 'none';
      errorMessage.textContent = msg || 'Unknown error';
      statusDot.className = 'status-dot error';
    }

    function showEmpty() {
      loadingEl.classList.remove('active');
      errorEl.classList.remove('active');
      emptyEl.classList.add('active');
      pairsContainer.style.display = 'none';
    }

    function hideAllStates() {
      loadingEl.classList.remove('active');
      errorEl.classList.remove('active');
      emptyEl.classList.remove('active');
    }

    // ============================================================
    //  INIT
    // ============================================================
    function init() {
      // Show overlay with a small delay for smooth entrance
      setTimeout(() => {
        overlayEl.classList.remove('hidden');
      }, 300);

      // Initial load
      loadFromRunTxt();

      // Auto-refresh every 3 seconds (for OBS / live editing)
      refreshInterval = setInterval(loadFromRunTxt, 3000);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
