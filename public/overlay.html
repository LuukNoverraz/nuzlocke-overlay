<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuzlocke Overlay</title>
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Nuzlocke Overlay" />
  <link rel="manifest" href="/favicon/site.webmanifest" />

  <style>
    /* ============================================================
       RESET & BASE
       ============================================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
      font-family: 'FLURO', 'Segoe UI', sans-serif;
      color: #f0f4f8;
    }

    /* ============================================================
       FLURO FONTS
       ============================================================ */
    @font-face {
      font-family: 'FLURO';
      src: url('/fonts/KAZER-STUDIO-FLURO.OTF') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'FLURO';
      src: url('/fonts/KAZER-STUDIO-FLURO-BOLD.OTF') format('opentype');
      font-weight: bold;
      font-style: normal;
    }
    @font-face {
      font-family: 'FLURO';
      src: url('/fonts/KAZER-STUDIO-FLURO-LIGHT.OTF') format('opentype');
      font-weight: 300;
      font-style: normal;
    }
    @font-face {
      font-family: 'FLURO';
      src: url('/fonts/KAZER-STUDIO-FLURO-SEMIBOLD.OTF') format('opentype');
      font-weight: 600;
      font-style: normal;
    }

    /* ============================================================
       OVERLAY CONTAINER — fully transparent, full-width
       ============================================================ */
    #overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100vw;
      background: transparent !important;
      padding: 0 16px 12px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    #overlay.hidden {
      opacity: 0;
    }

    /* ============================================================
       PAIRS ROW — horizontal scroll of circles
       ============================================================ */
    #pairs-container {
      width: 100%;
      max-width: 100vw;
      overflow-x: auto;
      overflow-y: hidden;
      padding-top: 2em;
      padding-bottom: 2em;
      margin-bottom: -32px;
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 16px;
      transform: scale(1.5) translate(0px, -4em);
      pointer-events: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    #pairs-container::-webkit-scrollbar {
      display: none;
    }

    /* ============================================================
       PAIR CIRCLE — the "O" containing a duo
       ============================================================ */
    .pair-circle {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: visible;
      cursor: default;
      clip-path: none;
      -webkit-clip-path: none;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.52) 0%,
        rgba(255, 255, 255, 0.04) 50%,
        rgba(255, 255, 255, 0.60) 100%
      );
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.25s ease;
    }

    .pair-circle::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(
        135deg,
        transparent 25%,
        rgba(255, 255, 255, 0.08) 40%,
        rgba(255, 255, 255, 0.14) 50%,
        rgba(255, 255, 255, 0.08) 60%,
        transparent 75%
      );
      pointer-events: none;
      z-index: 0;
    }

    .pair-circle:hover {
      border-color: rgba(255, 255, 255, 0.12);
      filter: brightness(1.15);
    }

    .pair-circle.dead {
      border-color: rgba(248, 113, 113, 0.15);
      background: linear-gradient(
        135deg,
        rgba(40, 20, 25, 0.75) 0%,
        rgba(40, 20, 25, 0.75) 65%,
        rgba(55, 25, 30, 0.75) 65%,
        rgba(55, 25, 30, 0.75) 100%
      );
    }

    .pair-circle.dead:hover {
      border-color: rgba(248, 113, 113, 0.25);
    }

    /* ============================================================
       POKEMON NAMES inside circle — top & bottom
       ============================================================ */
    .pair-name-primary {
      font-family: 'FLURO', sans-serif;
      font-weight: 600;
      font-size: 1em;
      color: #f0f4f8;
      letter-spacing: 0.03em;
      text-align: center;
      position: absolute;
      top: 0px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      z-index: 3;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.25),
        0 0 20px rgba(255, 255, 255, 0.08),
        0 1px 4px rgba(0, 0, 0, 1);
    }

    .pair-name-primary.dead {
      color: rgba(248, 113, 113, 0.7);
    }

    .pair-name-secondary {
      font-family: 'FLURO', sans-serif;
      font-weight: 600;
      font-size: 1em;
      color: #f0f4f8;
      letter-spacing: 0.03em;
      text-align: center;
      position: absolute;
      bottom: 0px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      z-index: 3;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.25),
        0 0 20px rgba(255, 255, 255, 0.08),
        0 1px 4px rgba(0, 0, 0, 1);
    }

    .pair-name-secondary.dead {
      color: rgba(248, 113, 113, 0.7);
    }

    /* ============================================================
       SPRITES inside circle — stacked diagonally (Soul Link)
       ============================================================ */
    .circle-sprite {
      position: absolute;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: filter 0.3s ease;
      z-index: 1;
    }

    .circle-sprite.p1 {
      top: 8px;
      right: 64px;
      width: 7em;
      height: 7em;
    }

    .circle-sprite.p2 {
      top: 40px;
      right: -8px;
      width: 7em;
      height: 7em;
      z-index: 2;
      transform: scaleX(-1);
    }

    .circle-sprite.dead {
      filter: grayscale(1) brightness(0.35);
    }

    /* ============================================================
       SPRITES — Solo Nuzlocke (single Pokémon, centered, larger)
       Applied when a route has only one Pokémon (no "&" in species).
       ============================================================ */
    .circle-sprite.solo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 10em;
      height: 10em;
      z-index: 1;
    }

    /* ============================================================
       NAMES — Solo Nuzlocke (single name, centered at bottom)
       ============================================================ */
    .pair-name-solo {
      font-family: 'FLURO', sans-serif;
      font-weight: 600;
      font-size: 1em;
      color: #f0f4f8;
      letter-spacing: 0.03em;
      text-align: center;
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      z-index: 3;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.25),
        0 0 20px rgba(255, 255, 255, 0.08),
        0 1px 4px rgba(0, 0, 0, 1);
    }

    .pair-name-solo.dead {
      color: rgba(248, 113, 113, 0.7);
    }

    /* ============================================================
       EMPTY / LOADING / ERROR STATES
       ============================================================ */
    #loading,
    #error,
    #empty {
      display: none;
      text-align: center;
      padding: 20px 20px;
      font-family: 'FLURO', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
      pointer-events: auto;
    }

    #loading.active,
    #error.active,
    #empty.active {
      display: block;
    }

    #error.active {
      color: rgba(248, 113, 113, 0.6);
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.08);
      border-top-color: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ============================================================
       ADMIN PANEL
       ============================================================ */
    #admin-panel {
      display: none;
      flex-shrink: 0;
      padding-top: 6px;
      margin-top: 4px;
      pointer-events: auto;
    }

    #admin-panel.active {
      display: block;
    }

    #admin-panel .admin-label {
      font-family: 'FLURO', sans-serif;
      font-weight: 300;
      font-size: 0.5rem;
      color: rgba(251, 191, 36, 0.35);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
      text-align: center;
    }

    .admin-swap-btn {
      font-family: 'FLURO', sans-serif;
      font-weight: 600;
      font-size: 0.5rem;
      padding: 2px 8px;
      border-radius: 6px;
      border: 1px solid rgba(251, 191, 36, 0.2);
      background: rgba(251, 191, 36, 0.06);
      color: rgba(251, 191, 36, 0.6);
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .admin-swap-btn:hover {
      background: rgba(251, 191, 36, 0.12);
      border-color: rgba(251, 191, 36, 0.35);
      color: #fbbf24;
    }

    .admin-swap-btn:active {
      transform: scale(0.95);
    }

    .admin-swap-btn:focus-visible {
      outline: 2px solid #fbbf24;
      outline-offset: 2px;
    }

    .admin-swap-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 768px) {
      .pair-circle {
        width: 140px;
        height: 140px;
      }
      .circle-sprite.p1 {
        top: -20px;
        right: 50px;
        width: 8em;
        height: 8em;
      }
      .circle-sprite.p2 {
        top: 24px;
        right: -14px;
        width: 6.5em;
        height: 6.5em;
      }
      .pair-name-primary {
        font-size: 0.85em;
        top: 12px;
      }
      .pair-name-secondary {
        font-size: 0.7em;
        bottom: 12px;
      }
    }

    @media (max-width: 480px) {
      .pair-circle {
        width: 120px;
        height: 120px;
      }
      .circle-sprite.p1 {
        top: -16px;
        right: 42px;
        width: 7em;
        height: 7em;
      }
      .circle-sprite.p2 {
        top: 20px;
        right: -10px;
        width: 5.5em;
        height: 5.5em;
      }
      .pair-name-primary {
        font-size: 0.75em;
        top: 10px;
      }
      .pair-name-secondary {
        font-size: 0.6em;
        bottom: 10px;
      }
      #pairs-container {
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       OVERLAY
       ============================================================ -->
  <div id="overlay" class="hidden">

    <!-- Loading State -->
    <div id="loading" class="active" role="status" aria-live="polite">
      <div class="loading-spinner" aria-hidden="true"></div>
      <div>Loading Soul Link...</div>
    </div>

    <!-- Error State -->
    <div id="error" role="alert" aria-live="assertive">
      <div>⚠ Error</div>
      <div id="errorMessage" style="font-size:0.6rem;margin-top:4px;"></div>
    </div>

    <!-- Empty State -->
    <div id="empty" role="status" aria-live="polite">
      <div>No Soul Link pairs yet</div>
      <div style="font-size:0.55rem;margin-top:4px;opacity:0.5;">Add pairings to run.yaml to get started!</div>
    </div>

    <!-- Pairs Row (horizontal circles) -->
    <div id="pairs-container" style="display:none;"></div>

    <!-- Admin Panel -->
    <div id="admin-panel">
      <div class="admin-label">⚙ Admin — Click to simulate a swap</div>
      <div id="admin-buttons" style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;"></div>
    </div>

  </div>

  <script>
    // ============================================================
    //  Soul Link Overlay — OBS Browser Source
    //  Reads pairing data from one of these sources (priority order):
    //    1. localStorage key "nuzlocke-yaml" (set by index.html)
    //    2. ?data= URL parameter (base64-encoded YAML)
    //    3. /run.yaml (fallback for local dev)
    //
    //  @module overlay
    //  @requires PokeAPI (external sprite/type lookups)
    //  @note Designed for Chromium (OBS Embedded Browser)
    // ============================================================

    // ============================================================
    //  URL PARAMETERS
    //  @section config
    // ============================================================

    /** @const {URLSearchParams} Parsed query string */
    const urlParams = new URLSearchParams(window.location.search);

    /**
     * The slug from the URL query string (e.g. `?attempt4` → `"attempt4"`).
     * Used to validate against the title line in run.yaml.
     * @const {string}
     */
    const QUERY_SLUG = window.location.search.replace(/^\?/, '').trim();

    /** @const {boolean} Show admin swap-simulation buttons */
    const IS_ADMIN = urlParams.get('admin') === 'true';

    /** @const {boolean} Global shiny override for all sprites */
    const SHINY = urlParams.get('shiny') === 'true';

    /** @const {boolean} Show female variant sprites */
    const FEMALE = urlParams.get('female') === 'true';

    /**
     * PokeAPI artwork variant: "official-artwork" (default) or "home".
     * @const {'official-artwork'|'home'}
     */
    const ART_VARIANT = urlParams.get('art') === 'home' ? 'home' : 'official-artwork';

    // ============================================================
    //  GOOGLE FONT OVERRIDE
    //  @section fonts
    //
    //  Streamers can replace the default FLURO font with any Google
    //  Font by passing `?font=FontName` in the URL.
    //
    //  Examples:
    //    ?attempt4&font=Press+Start+2P
    //    ?attempt4&font=Rubik&font-weight=300;400;600;700
    //
    //  The font is loaded dynamically via a <link> tag injected into
    //  <head>. Once loaded, it becomes the primary font-family with
    //  FLURO as fallback.
    //
    //  @const {string|null} FONT_NAME - Google Font name (e.g. "Press+Start+2P")
    //  @const {string}      FONT_WEIGHTS - Semicolon-separated weights (default "400;600;700")
    // ============================================================

    /**
     * Google Font family name from the `?font=` URL parameter.
     * Spaces should be encoded as `+` (e.g. `?font=Press+Start+2P`).
     * If omitted, the default FLURO font is used.
     * @const {string|null}
     */
    const FONT_NAME = urlParams.get('font') || null;

    /**
     * Font weights to load from Google Fonts, semicolon-separated.
     * Only used when `?font=` is also specified.
     * Defaults to "400;600;700" (regular, semi-bold, bold).
     * @const {string}
     */
    const FONT_WEIGHTS = urlParams.get('font-weight') || '400;600;700';

    // ============================================================
    //  DOM REFS
    //  @section dom
    // ============================================================
    const overlayEl = document.getElementById('overlay');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const errorMessage = document.getElementById('errorMessage');
    const emptyEl = document.getElementById('empty');
    const pairsContainer = document.getElementById('pairs-container');
    const adminPanel = document.getElementById('admin-panel');
    const adminButtons = document.getElementById('admin-buttons');

    // ============================================================
    //  SPRITE & TYPE LOOKUPS
    //  @section sprites
    // ============================================================

    /**
     * Base URL for PokeAPI official artwork sprites.
     * Dynamically built from ART_VARIANT.
     * @const {string}
     */
    const SPRITE_BASE =
      `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/${ART_VARIANT}`;

    /**
     * Cache for dex ID lookups: speciesName → nationalDexId.
     * @type {Object<string, number>}
     */
    const dexCache = {};

    /**
     * Map of Pokémon type names to their hex colors.
     * Used for the diagonal gradient on pair circles.
     * @const {Object<string, string>}
     */
    const TYPE_COLORS = {
      normal: '#A8A77A', fire: '#EE8130', water: '#6390F0',
      electric: '#F7D02C', grass: '#7AC74C', ice: '#96D9D6',
      fighting: '#C22E28', poison: '#A33EA1', ground: '#E2BF65',
      flying: '#A98FF3', psychic: '#F95587', bug: '#A6B91A',
      rock: '#B6A136', ghost: '#735797', dragon: '#6F35FC',
      dark: '#705746', steel: '#B7B7CE', fairy: '#D685AD',
    };

    /**
     * Cache for type lookups: speciesName → [primaryType, secondaryType|null].
     * @type {Object<string, [string|null, string|null]>}
     */
    const typeCache = {};

    /**
     * Parse a species name, detecting an optional "(Shiny)" suffix.
     *
     * @param {string} raw - Raw species string (e.g. "Piplup (Shiny)").
     * @returns {{ cleanName: string, isShiny: boolean }}
     *   - cleanName: lowercased species name with suffix stripped.
     *   - isShiny: true if "(Shiny)" was found.
     *
     * @example
     *   parseSpeciesName("Piplup (Shiny)") // → { cleanName: "piplup", isShiny: true }
     *   parseSpeciesName("Piplup")         // → { cleanName: "piplup", isShiny: false }
     *
     * @note Only the first "(Shiny)" match is detected.
     *   "Pikachu (Shiny) (Shiny)" → cleanName: "pikachu (shiny)", isShiny: true
     */
    function parseSpeciesName(raw) {
      const trimmed = raw.trim();
      const match = trimmed.match(/^(.+?)\s*\(Shiny\)\s*$/i);
      if (match) {
        return { cleanName: match[1].toLowerCase().trim(), isShiny: true };
      }
      return { cleanName: trimmed.toLowerCase().trim(), isShiny: false };
    }

    /**
     * Fetch both primary and secondary types for a Pokémon species from PokeAPI.
     * Results are cached in {@link typeCache} as [primary, secondary|null].
     *
     * For solo Nuzlocke mode, the primary type is used as `c1` and the secondary
     * type (or primary if mono-type) is used as `c2` in the diagonal gradient,
     * giving the same visual treatment as Soul Link pairs.
     *
     * @param {string} speciesName - Species name (may include "(Shiny)" suffix).
     * @returns {Promise<[string|null, string|null]>}
     *   Tuple of [primaryTypeName, secondaryTypeName|null].
     *   - primaryTypeName: e.g. "water" — the first type slot.
     *   - secondaryTypeName: e.g. "flying" — the second type slot, or null if mono-type.
     */
    async function getPokemonTypes(speciesName) {
      const { cleanName } = parseSpeciesName(speciesName);
      if (typeCache[cleanName]) return typeCache[cleanName];
      try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${cleanName}`);
        if (!res.ok) return [null, null];
        const data = await res.json();
        const primary = data.types?.[0]?.type?.name || null;
        const secondary = data.types?.[1]?.type?.name || null;
        const result = [primary, secondary];
        typeCache[cleanName] = result;
        return result;
      } catch {
        return [null, null];
      }
    }

    /**
     * Fetch the National Pokédex ID for a species from PokeAPI.
     * Results are cached in {@link dexCache}.
     *
     * @param {string} speciesName - Species name (may include "(Shiny)" suffix).
     * @returns {Promise<number|null>} Dex ID or null on failure.
     */
    async function getDexId(speciesName) {
      const { cleanName } = parseSpeciesName(speciesName);
      if (dexCache[cleanName]) return dexCache[cleanName];
      try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${cleanName}`);
        if (!res.ok) return null;
        const data = await res.json();
        dexCache[cleanName] = data.id;
        return data.id;
      } catch {
        return null;
      }
    }

    /**
     * Build a PokeAPI sprite URL for a given Pokémon.
     *
     * Shiny priority (highest to lowest):
     *   1. perPokemonShiny (from "(Shiny)" suffix in run.yaml)
     *   2. global SHINY param (from URL ?shiny=true)
     *
     * @param {number|null} dexId - National Pokédex ID.
     * @param {boolean} perPokemonShiny - Per-Pokémon shiny flag from parser.
     * @param {boolean} female - Whether to request female variant.
     * @returns {string|null} Full sprite URL, or null if dexId is falsy.
     *
     * @note For "home" artwork variant, female variants are not available
     *   in the PokeAPI repository, so female is silently ignored.
     */
    function buildSpriteUrl(dexId, perPokemonShiny, female) {
      if (!dexId) return null;

      const useShiny = perPokemonShiny || SHINY;
      const useFemale = female && ART_VARIANT !== 'home';

      let path = `${SPRITE_BASE}/`;
      if (useShiny && useFemale) path += `shiny/female/${dexId}.png`;
      else if (useShiny) path += `shiny/${dexId}.png`;
      else if (useFemale) path += `female/${dexId}.png`;
      else path += `${dexId}.png`;
      return path;
    }

    // ============================================================
    //  RUN.YAML PARSER
    //  @section parser
    // ============================================================

    /**
     * Advance the line index past any blank lines.
     *
     * @param {string[]} lines - Array of raw text lines.
     * @param {number} i - Current index (will be mutated).
     * @returns {number} New index after skipping blanks, or lines.length if EOF.
     * @private
     */
    function skipBlankLines(lines, i) {
      while (i < lines.length && lines[i].trim() === '') i++;
      return i;
    }

    /**
     * Parse the .yaml format into structured pairing data.
     *
     * The `.yaml` file format is identical to the original `.txt` format
     * but adds support for comment lines. Lines starting with `#` are
     * stripped before parsing, allowing streamers to comment out dead
     * pairs, add notes, or temporarily disable routes without deleting
     * them from the file.
     *
     * Supports two modes, auto-detected per route:
     *
     * **Soul Link** (two Pokémon per route — species line contains `&`):
     * ```
     * - Route 201
     * Nightfall & Daybreak
     * Piplup & Piplup
     * ```
     *
     * **Solo Nuzlocke** (one Pokémon per route — species line has NO `&`):
     * ```
     * - Route 201
     * Nightfall
     * Piplup (Shiny)
     * ```
     *
     * Rules:
     * - Line 1: Title → slug (lowercased, spaces removed).
     * - Lines starting with "- ": Route/pairing header.
     *   - If header ends with `(DEAD)` or `(BOX)`, the entire pairing is skipped.
     * - Next non-blank line: Nicknames (P1 & P2 for Soul Link, or single for Solo).
     * - Next non-blank line: Species (P1 & P2 for Soul Link, or single for Solo).
     *   - Species may end with `(Shiny)` to flag shiny sprite.
     * - Blank lines are ignored.
     *
     * @param {string} text - Raw content of run.yaml.
     * @returns {{ title: string, slug: string, pairs: Array<Object> }}
     *   Parsed data ready for rendering.
     *   Each pair object has:
     *   - `isSolo` {boolean} — true if this route has only one Pokémon
     *   - `p1` {Object} — always populated (the single Pokémon in solo mode)
     *   - `p2` {Object|null} — null in solo mode, populated in Soul Link mode
     */
    function parseRunTxt(text) {
      // Strip comment lines (lines starting with #) before parsing.
      // This allows streamers to comment out dead pairs, add notes,
      // or temporarily disable routes without deleting them.
      const rawLines = text.split('\n');
      const lines = rawLines.filter(line => !line.trim().startsWith('#'));

      // --- Line 1: Title ---
      const title = (lines[0] || '').trim();
      const slug = title.toLowerCase().replace(/\s+/g, '');

      const pairs = [];
      let i = 1; // skip title line

      while (i < lines.length) {
        const line = lines[i].trim();

        if (line.startsWith('- ')) {
          // --- Route header ---
          const routePart = line.slice(2).trim();

          // Check for skip markers
          const upper = routePart.toUpperCase();
          const isSkipped = upper.endsWith('(DEAD)') || upper.endsWith('(BOX)');

          // Extract clean route name (strip the marker)
          let routeName = routePart;
          routeName = routeName.replace(/\s*\(DEAD\)\s*$/i, '').trim();
          routeName = routeName.replace(/\s*\(BOX\)\s*$/i, '').trim();

          // --- Nicknames ---
          i = skipBlankLines(lines, i + 1);
          if (i >= lines.length) break;
          const nicknameLine = lines[i].trim();

          // --- Species ---
          i = skipBlankLines(lines, i + 1);
          if (i >= lines.length) break;
          const speciesLine = lines[i].trim();

          if (isSkipped) {
            i++;
            continue;
          }

          // --- Auto-detect mode from species line ---
          // If the species line contains "&", it's a Soul Link pair (two Pokémon).
          // Otherwise, it's a Solo Nuzlocke (one Pokémon).
          const isSolo = !speciesLine.includes('&');

          if (isSolo) {
            // ── Solo Nuzlocke mode ──
            // Single nickname, single species.
            const nickname = nicknameLine.trim();
            const parsed = parseSpeciesName(speciesLine);

            pairs.push({
              originKey: routeName.toLowerCase().replace(/\s+/g, '-'),
              routeName: routeName,
              isSolo: true,
              p1: {
                nickname: nickname,
                name: parsed.cleanName,
                rawName: speciesLine.trim(),
                shiny: parsed.isShiny,
                events: {},
              },
              p2: null, // No second Pokémon in solo mode
              swappedAt: null,
            });
          } else {
            // ── Soul Link mode (two Pokémon) ──
            // Parse "Nick1 & Nick2"
            const nickParts = nicknameLine.split('&').map(s => s.trim());
            const nick1 = nickParts[0] || '';
            const nick2 = nickParts[1] || '';

            // Parse "Species1 & Species2" with (Shiny) detection
            const specParts = speciesLine.split('&').map(s => s.trim());
            const rawSpec1 = specParts[0] || '';
            const rawSpec2 = specParts[1] || '';

            const parsed1 = parseSpeciesName(rawSpec1);
            const parsed2 = parseSpeciesName(rawSpec2);

            pairs.push({
              originKey: routeName.toLowerCase().replace(/\s+/g, '-'),
              routeName: routeName,
              isSolo: false,
              p1: {
                nickname: nick1,
                name: parsed1.cleanName,
                rawName: rawSpec1,
                shiny: parsed1.isShiny,
                events: {},
              },
              p2: {
                nickname: nick2,
                name: parsed2.cleanName,
                rawName: rawSpec2,
                shiny: parsed2.isShiny,
                events: {},
              },
              swappedAt: null,
            });
          }
        }

        i++;
      }

      return { title, slug, pairs };
    }

    // ============================================================
    //  DATA SOURCE — localStorage, ?data=, or /run.yaml fallback
    //  @section loader
    //
    //  Priority:
    //    1. localStorage key "nuzlocke-yaml" (set by index.html)
    //    2. ?data= URL parameter (base64-encoded YAML)
    //    3. /run.yaml (fallback for local dev)
    // ============================================================

    /** @const {string} localStorage key shared with index.html */
    const STORAGE_KEY = 'nuzlocke-yaml';

    /**
     * Cached JSON of the last rendered pairs for change detection.
     * @type {string}
     */
    let lastPairsJson = '';

    /** @type {number|null} setInterval ID for polling */
    let refreshInterval = null;

    /**
     * Polling interval in milliseconds.
     * @const {number}
     */
    const POLL_INTERVAL_MS = 3000;

    /**
     * Try to load YAML from localStorage (set by index.html).
     * @returns {string|null} YAML text or null if not found/empty.
     */
    function loadFromLocalStorage() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved && saved.trim()) return saved.trim();
      } catch (e) {
        // localStorage may be unavailable in some OBS contexts
        console.warn('[Overlay] localStorage not available:', e.message);
      }
      return null;
    }

    /**
     * Try to load YAML from the ?data= URL parameter (base64-encoded).
     * @returns {string|null} Decoded YAML text or null if param missing.
     */
    function loadFromUrlParam() {
      const encoded = urlParams.get('data');
      if (!encoded) return null;
      try {
        const decoded = decodeURIComponent(escape(atob(encoded)));
        if (decoded.trim()) return decoded.trim();
      } catch (e) {
        console.warn('[Overlay] Failed to decode ?data= parameter:', e.message);
      }
      return null;
    }

    /**
     * Parse YAML text and render the overlay.
     *
     * @param {string} text - Raw YAML content.
     * @param {string} source - Label for the data source (for logging).
     * @returns {Promise<boolean>} True if rendered successfully.
     */
    async function parseAndRender(text, source) {
      if (!text.trim()) {
        showError('YAML data is empty');
        return false;
      }

      const parsed = parseRunTxt(text);

      // Validate slug against query param (if one was provided)
      if (QUERY_SLUG && QUERY_SLUG !== parsed.slug && !QUERY_SLUG.startsWith('run=')) {
        console.warn(`[Overlay] Query slug "${QUERY_SLUG}" doesn't match file title slug "${parsed.slug}"`);
      }

      // Content-based change detection
      const newJson = JSON.stringify(parsed.pairs);
      if (newJson === lastPairsJson) return false;

      lastPairsJson = newJson;

      console.log(`[Overlay] Rendering from ${source} (${parsed.pairs.length} pairs)`);

      // --- Render ---
      await renderPairs(parsed.pairs);
      setupAdminPanel(parsed.pairs);

      hideAllStates();
      if (parsed.pairs.length === 0) {
        showEmpty();
      } else {
        pairsContainer.style.display = 'flex';
      }

      return true;
    }

    /**
     * Main load function — tries sources in priority order.
     *
     * Priority:
     *   1. localStorage key "nuzlocke-yaml" (set by index.html)
     *   2. ?data= URL parameter (base64-encoded YAML)
     *   3. /run.yaml (fallback for local dev)
     *
     * @returns {Promise<void>}
     */
    async function loadFromRunTxt() {
      try {
        // ── Priority 1: localStorage ──
        const lsYaml = loadFromLocalStorage();
        if (lsYaml) {
          await parseAndRender(lsYaml, 'localStorage');
          return;
        }

        // ── Priority 2: ?data= URL parameter ──
        const urlYaml = loadFromUrlParam();
        if (urlYaml) {
          await parseAndRender(urlYaml, '?data= param');
          return;
        }

        // ── Priority 3: /run.yaml fallback ──
        const res = await fetch('/run.yaml');

        if (!res.ok) {
          showError(`Failed to load run.yaml (HTTP ${res.status})`);
          return;
        }

        const text = await res.text();
        await parseAndRender(text, '/run.yaml');

      } catch (err) {
        console.error('[Overlay] Error loading data:', err);
        showError(err.message || 'Failed to load data');
      }
    }

    // ============================================================
    //  RENDER — horizontal circles
    //  Supports both Soul Link (two Pokémon) and Solo Nuzlocke
    //  (one Pokémon) modes, auto-detected per route.
    // ============================================================
    async function renderPairs(pairs) {
      pairsContainer.innerHTML = '';
      if (pairs.length === 0) return;

      // Batch resolve dex IDs and type colors.
      // For each Pokémon we fetch [primaryType, secondaryType] so that
      // solo Nuzlocke circles can use the same diagonal gradient as
      // Soul Link circles (primary → secondary, or primary → primary
      // if the Pokémon is mono-type).
      const dexPromises = [];
      const typePromises = [];
      for (const pair of pairs) {
        const name1 = pair.p1 ? pair.p1.name : null;
        const name2 = pair.p2 ? pair.p2.name : null;
        dexPromises.push(name1 ? getDexId(name1) : Promise.resolve(null));
        dexPromises.push(name2 ? getDexId(name2) : Promise.resolve(null));
        // getPokemonTypes returns [primaryType, secondaryType|null]
        typePromises.push(name1 ? getPokemonTypes(name1) : Promise.resolve([null, null]));
        typePromises.push(name2 ? getPokemonTypes(name2) : Promise.resolve([null, null]));
      }
      const dexIds = await Promise.all(dexPromises);
      const typeResults = await Promise.all(typePromises);

      pairs.forEach((pair, idx) => {
        const dexId1 = dexIds[idx * 2];
        const dexId2 = dexIds[idx * 2 + 1];
        // typeResults[idx*2] = [primary1, secondary1], typeResults[idx*2+1] = [primary2, secondary2]
        const types1 = typeResults[idx * 2];
        const types2 = typeResults[idx * 2 + 1];

        const isSwapped = !!pair.swappedAt;
        const isSolo = pair.isSolo;

        // Build the circle
        const circle = document.createElement('div');
        circle.className = 'pair-circle';
        if (isSwapped) circle.classList.add('swapped');
        if (isSolo) circle.classList.add('solo');
        circle.dataset.origin = pair.originKey;

        // ── Type-colored background ──
        // Both Soul Link and Solo Nuzlocke use the same diagonal split
        // gradient. The difference is which types feed into c1 and c2:
        //
        // Soul Link: c1 = Player 1's primary type, c2 = Player 2's primary type.
        // Solo:      c1 = the single Pokémon's primary type,
        //            c2 = the single Pokémon's secondary type (or primary if mono-type).
        //
        // This gives solo circles the same polished diagonal look as pairs.
        let c1, c2;

        if (isSolo) {
          // Solo Nuzlocke: use primary → secondary (or primary → primary if mono-type)
          const primary = types1?.[0] || null;
          const secondary = types1?.[1] || primary; // fallback to primary if mono-type
          c1 = TYPE_COLORS[primary] || 'rgba(255,255,255,0.08)';
          c2 = TYPE_COLORS[secondary] || 'rgba(255,255,255,0.08)';
        } else {
          // Soul Link: use Player 1's primary → Player 2's primary
          const type1 = types1?.[0] || null;
          const type2 = types2?.[0] || null;
          c1 = TYPE_COLORS[type1] || 'rgba(255,255,255,0.08)';
          c2 = TYPE_COLORS[type2] || 'rgba(255,255,255,0.08)';
        }

        // Same diagonal gradient for both modes — no special CSS needed.
        circle.style.background = `
          linear-gradient(135deg,
            rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 50%,
            rgba(255,255,255,0.18) 100%
          ),
          linear-gradient(135deg,
            ${c1}AA 0%, ${c1}66 40%,
            ${c2}66 60%, ${c2}AA 100%
          )
        `;

        // ── Sprites ──
        // Solo mode: single sprite, centered, larger (class .solo).
        // Soul Link: two sprites offset diagonally (classes .p1 / .p2).
        if (pair.p1) {
          const spriteUrl1 = buildSpriteUrl(dexId1, pair.p1.shiny, FEMALE);
          if (spriteUrl1) {
            const img1 = document.createElement('img');
            img1.className = isSolo ? 'circle-sprite solo' : 'circle-sprite p1';
            img1.src = spriteUrl1;
            img1.alt = pair.p1.name || 'pokemon';
            img1.loading = 'lazy';
            img1.onerror = function() { this.style.display = 'none'; };
            circle.appendChild(img1);
          }
        }

        // Sprite 2 (player 2) — only in Soul Link mode
        if (pair.p2 && !isSolo) {
          const spriteUrl2 = buildSpriteUrl(dexId2, pair.p2.shiny, FEMALE);
          if (spriteUrl2) {
            const img2 = document.createElement('img');
            img2.className = 'circle-sprite p2';
            img2.src = spriteUrl2;
            img2.alt = pair.p2.name || 'pokemon';
            img2.loading = 'lazy';
            img2.onerror = function() { this.style.display = 'none'; };
            circle.appendChild(img2);
          }
        }

        // ── Names ──
        const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);

        if (isSolo) {
          // Solo mode: single name, centered at bottom (class .pair-name-solo)
          const name = pair.p1 ? cap(pair.p1.nickname || pair.p1.name || '?') : '?';
          const nameEl = document.createElement('span');
          nameEl.className = 'pair-name-solo';
          nameEl.textContent = name;
          circle.appendChild(nameEl);
        } else {
          // Soul Link mode: two names, top & bottom (classes .pair-name-primary / .pair-name-secondary)
          const name1 = pair.p1 ? cap(pair.p1.nickname || pair.p1.name || '?') : '—';
          const name2 = pair.p2 ? cap(pair.p2.nickname || pair.p2.name || '?') : '—';

          const primaryName = document.createElement('span');
          primaryName.className = 'pair-name-primary';
          primaryName.textContent = name1;
          circle.appendChild(primaryName);

          const secondaryName = document.createElement('span');
          secondaryName.className = 'pair-name-secondary';
          secondaryName.textContent = `& ${name2}`;
          circle.appendChild(secondaryName);
        }

        pairsContainer.appendChild(circle);
      });

      // ── Dynamic scale based on pair count ──
      // If there are 6+ circles, shrink the scale from 1.5 to 1.25
      // to reduce the horizontal footprint and prevent overflow.
      // The CSS default is scale(1.5); we override it inline here.
      const circleCount = pairsContainer.querySelectorAll('.pair-circle').length;
      pairsContainer.style.transform = circleCount >= 6
        ? 'scale(1.25) translate(0px, -4em)'
        : 'scale(1.5) translate(0px, -4em)';
    }

    // ============================================================
    //  ADMIN PANEL
    //  Shows swap-simulation buttons for Soul Link pairs only.
    //  Solo Nuzlocke pairs are excluded (swapping is meaningless).
    // ============================================================
    function setupAdminPanel(pairs) {
      if (!IS_ADMIN) {
        adminPanel.classList.remove('active');
        return;
      }
      adminPanel.classList.add('active');
      adminButtons.innerHTML = '';

      for (const pair of pairs) {
        // Skip solo pairs — swapping doesn't apply to single-Pokémon routes
        if (pair.isSolo) continue;

        const btn = document.createElement('button');
        btn.className = 'admin-swap-btn';
        btn.textContent = `⤾ ${pair.routeName}`;
        btn.dataset.origin = pair.originKey;
        btn.setAttribute('aria-label', `Toggle swap for ${pair.routeName}`);

        btn.addEventListener('click', () => {
          // Toggle swap state locally (no Firebase needed)
          const wasSwapped = !!pair.swappedAt;
          pair.swappedAt = wasSwapped ? null : Date.now();

          // Re-render just this circle
          loadFromRunTxt();

          btn.textContent = wasSwapped ? `⤾ ${pair.routeName}` : '⤾ Swapped!';
          setTimeout(() => {
            btn.textContent = `⤾ ${pair.routeName}`;
          }, 2000);
        });

        adminButtons.appendChild(btn);
      }
    }

    // ============================================================
    //  UI HELPERS
    // ============================================================
    function showLoading() {
      loadingEl.classList.add('active');
      errorEl.classList.remove('active');
      emptyEl.classList.remove('active');
      pairsContainer.style.display = 'none';
    }

    function showError(msg) {
      loadingEl.classList.remove('active');
      errorEl.classList.add('active');
      emptyEl.classList.remove('active');
      pairsContainer.style.display = 'none';
      errorMessage.textContent = msg || 'Unknown error';
    }

    function showEmpty() {
      loadingEl.classList.remove('active');
      errorEl.classList.remove('active');
      emptyEl.classList.add('active');
      pairsContainer.style.display = 'none';
    }

    function hideAllStates() {
      loadingEl.classList.remove('active');
      errorEl.classList.remove('active');
      emptyEl.classList.remove('active');
    }

    // ============================================================
    //  GOOGLE FONT LOADER
    //  @section font-loader
    //
    //  If `?font=FontName` was provided in the URL, dynamically inject
    //  a <link> tag to load that font from Google Fonts, then update
    //  the body's font-family once loaded.
    //
    //  This runs before the overlay data fetch so the font is ready
    //  (or at least loading) by the time the first render happens.
    // ============================================================

    /**
     * Dynamically load a Google Font and apply it as the primary font.
     *
     * Injects a `<link rel="stylesheet">` into `<head>` pointing to the
     * Google Fonts CSS2 API. On load, updates `document.body.style.fontFamily`
     * so all text uses the chosen font with FLURO as fallback.
     *
     * If `?font=` was not specified, this function does nothing.
     *
     * @function loadGoogleFont
     * @returns {void}
     *
     * @example
     *   // URL: ?attempt4&font=Press+Start+2P
     *   loadGoogleFont();
     *   // → <link href="...Press+Start+2P:wght@400;600;700..." rel="stylesheet">
     *   // → body font-family: 'Press Start 2P', 'FLURO', sans-serif
     */
    function loadGoogleFont() {
      if (!FONT_NAME) return;

      // Build the Google Fonts URL.
      // Uses the CSS2 API which supports variable weights via :wght@ syntax.
      // encodeURIComponent handles special characters in font names.
      const fontFamily = FONT_NAME.replace(/\+/g, ' ');
      const href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(fontFamily)}:wght@${FONT_WEIGHTS}&display=swap`;

      // Inject the stylesheet link
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = href;

      // Once the font is loaded, inject a <style> tag that overrides
      // all FLURO-specific font-family declarations with !important.
      //
      // We cannot just set document.body.style.fontFamily because every
      // text element in the CSS has its own explicit `font-family: 'FLURO'`
      // declaration (e.g. .pair-name-primary, .pair-name-solo, #loading).
      // Those class-level rules have higher specificity than the body's
      // inherited font-family, so the Google Font would never apply to
      // child elements without !important.
      link.onload = () => {
        const style = document.createElement('style');
        style.textContent = `
          body,
          .pair-name-primary,
          .pair-name-secondary,
          .pair-name-solo,
          #loading,
          #error,
          #empty,
          .admin-label,
          .admin-swap-btn {
            font-family: '${fontFamily}', 'FLURO', 'Segoe UI', sans-serif !important;
          }
        `;
        document.head.appendChild(style);
        console.log(`[Overlay] Google Font loaded: ${fontFamily}`);
      };

      link.onerror = () => {
        console.warn(`[Overlay] Failed to load Google Font: ${fontFamily}. Falling back to FLURO.`);
      };

      document.head.appendChild(link);
    }

    // ============================================================
    //  INIT
    // ============================================================
    function init() {
      // Load Google Font (if specified via ?font=) before fetching data
      loadGoogleFont();

      // Show overlay with a small delay for smooth entrance
      setTimeout(() => {
        overlayEl.classList.remove('hidden');
      }, 300);

      // Initial load
      loadFromRunTxt();

      // Auto-refresh every 3 seconds (for OBS / live editing)
      refreshInterval = setInterval(loadFromRunTxt, 3000);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
