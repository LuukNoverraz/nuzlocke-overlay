<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soul Link Overlay</title>

  <!-- Firebase v9 compat SDK (works with <script> tags) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
  </script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js">
  </script>

  <style>
    /* ============================================================
       RESET & BASE
       ============================================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
      font-family: 'FLURO', 'Segoe UI', sans-serif;
      color: #f0f4f8;
    }

    /* ============================================================
       FLURO FONTS
       ============================================================ */
    @font-face {
      font-family: 'FLURO';
      src: url('/fonts/KAZER-STUDIO-FLURO.OTF') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'FLURO';
      src: url('/fonts/KAZER-STUDIO-FLURO-BOLD.OTF') format('opentype');
      font-weight: bold;
      font-style: normal;
    }
    @font-face {
      font-family: 'FLURO';
      src: url('/fonts/KAZER-STUDIO-FLURO-LIGHT.OTF') format('opentype');
      font-weight: 300;
      font-style: normal;
    }
    @font-face {
      font-family: 'FLURO';
      src: url('/fonts/KAZER-STUDIO-FLURO-SEMIBOLD.OTF') format('opentype');
      font-weight: 600;
      font-style: normal;
    }

    /* ============================================================
       OVERLAY CONTAINER — fully transparent, full-width
       ============================================================ */
    #overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100vw;
      background: transparent !important;
      padding: 0 16px 12px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.4s ease;
      pointer-events: none; /* let clicks pass through to game */
    }

    #overlay.hidden {
      opacity: 0;
    }

    /* ============================================================
       HEADER — minimal, transparent
       ============================================================ */
    #header {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 4px 0 8px 0;
      flex-shrink: 0;
      pointer-events: auto; /* re-enable for admin buttons */
    }

    #header .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px rgba(74, 222, 128, 0.5);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    #header .status-dot.error {
      background: #f87171;
      box-shadow: 0 0 6px rgba(248, 113, 113, 0.5);
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.85); }
    }

    #header .title-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #header h1 {
      font-family: 'FLURO', sans-serif;
      font-weight: bold;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.7);
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.08);
    }

    #header .run-id {
      font-family: 'FLURO', sans-serif;
      font-weight: 300;
      font-size: 0.6rem;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 0.05em;
    }

    #header .player-names {
      font-family: 'FLURO', sans-serif;
      font-weight: 300;
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.04em;
    }

    /* ============================================================
       PAIRS ROW — horizontal scroll of circles
       ============================================================ */
    #pairs-container {
      width: 100%;
      max-width: 100vw;
      overflow-x: auto;
      overflow-y: hidden;
      padding-top: 2em;
      padding-bottom: 2em;
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 16px;
      transform: scale(1.5) translate(0px, -4em);
      pointer-events: auto; /* re-enable for hover effects */
      /* Hide scrollbar */
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    #pairs-container::-webkit-scrollbar {
      display: none;
    }

    /* ============================================================
       PAIR CIRCLE — the "O" containing a duo
       ============================================================ */
    .pair-circle {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: default;
      /* Glassy background with sheen */
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.52) 0%,
        rgba(255, 255, 255, 0.04) 50%,
        rgba(255, 255, 255, 0.60) 100%
      );
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.25s ease;
    }

    /* Diagonal sheen across the glass */
    .pair-circle::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        135deg,
        transparent 30%,
        rgba(255, 255, 255, 0.06) 45%,
        rgba(255, 255, 255, 0.10) 50%,
        rgba(255, 255, 255, 0.06) 55%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 0;
    }

    .pair-circle:hover {
      border-color: rgba(255, 255, 255, 0.12);
      filter: brightness(1.15);
    }

    /* Dead state — subtle red tint */
    .pair-circle.dead {
      border-color: rgba(248, 113, 113, 0.15);
      background: linear-gradient(
        135deg,
        rgba(40, 20, 25, 0.75) 0%,
        rgba(40, 20, 25, 0.75) 65%,
        rgba(55, 25, 30, 0.75) 65%,
        rgba(55, 25, 30, 0.75) 100%
      );
    }

    .pair-circle.dead:hover {
      border-color: rgba(248, 113, 113, 0.25);
    }

    /* ============================================================
       ROUTE NAME inside circle
       ============================================================ */
    .pair-route {
      display: none;
    }

    /* ============================================================
       POKEMON NAMES inside circle — top & bottom
       ============================================================ */
    .pair-name-primary {
      font-family: 'FLURO', sans-serif;
      font-weight: 600;
      font-size: 1em;
      color: #f0f4f8;
      letter-spacing: 0.03em;
      text-align: center;
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      z-index: 3;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.25),
        0 0 20px rgba(255, 255, 255, 0.08),
        0 1px 4px rgba(0, 0, 0, 0.4);
    }

    .pair-name-primary.dead {
      color: rgba(248, 113, 113, 0.7);
    }

    .pair-name-secondary {
      font-family: 'FLURO', sans-serif;
      font-weight: 600;
      font-size: 0.8em;
      color: #f0f4f8;
      letter-spacing: 0.03em;
      text-align: center;
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      z-index: 3;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.25),
        0 0 20px rgba(255, 255, 255, 0.08),
        0 1px 4px rgba(0, 0, 0, 0.4);
    }

    .pair-name-secondary.dead {
      color: rgba(248, 113, 113, 0.7);
    }

    /* ============================================================
       SPRITES inside circle — stacked diagonally like Box view
       ============================================================ */
    .circle-sprite {
      position: absolute;
      width: 12em;
      height: 12em;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transition: filter 0.3s ease;
      z-index: 1;
    }

    /* Sprite 1 (player 1) — higher, offset left */
    .circle-sprite.p1 {
      top: -8px;
      right: 8px;
      z-index: 2;
      filter: drop-shadow(7px 8px 0px #00000040);
    }

    /* Sprite 2 (player 2) — lower, offset right */
    .circle-sprite.p2 {
      top: 0px;
      right: -10px;
      width: 8em;
      height: 8em;
    }

    .circle-sprite.dead {
      filter: grayscale(1) brightness(0.35);
    }

    /* ============================================================
       EMPTY / LOADING / ERROR STATES
       ============================================================ */
    #loading,
    #error,
    #empty {
      display: none;
      text-align: center;
      padding: 20px 20px;
      font-family: 'FLURO', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
      pointer-events: auto;
    }

    #loading.active,
    #error.active,
    #empty.active {
      display: block;
    }

    #error.active {
      color: rgba(248, 113, 113, 0.6);
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.08);
      border-top-color: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ============================================================
       ADMIN PANEL
       ============================================================ */
    #admin-panel {
      display: none;
      flex-shrink: 0;
      padding-top: 6px;
      margin-top: 4px;
      pointer-events: auto;
    }

    #admin-panel.active {
      display: block;
    }

    #admin-panel .admin-label {
      font-family: 'FLURO', sans-serif;
      font-weight: 300;
      font-size: 0.5rem;
      color: rgba(251, 191, 36, 0.35);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
      text-align: center;
    }

    .admin-swap-btn {
      font-family: 'FLURO', sans-serif;
      font-weight: 600;
      font-size: 0.5rem;
      padding: 2px 8px;
      border-radius: 6px;
      border: 1px solid rgba(251, 191, 36, 0.2);
      background: rgba(251, 191, 36, 0.06);
      color: rgba(251, 191, 36, 0.6);
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .admin-swap-btn:hover {
      background: rgba(251, 191, 36, 0.12);
      border-color: rgba(251, 191, 36, 0.35);
      color: #fbbf24;
    }

    .admin-swap-btn:active {
      transform: scale(0.95);
    }

    .admin-swap-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 768px) {
      .pair-circle {
        width: 140px;
        height: 140px;
      }
      .circle-sprite {
        width: 80px;
        height: 80px;
      }
      .circle-sprite.p1 {
        top: 24px;
        right: 42px;
      }
      .circle-sprite.p2 {
        top: 40px;
        right: 22px;
      }
      .pair-names {
        font-size: 0.55rem;
        bottom: 12px;
      }
      .pair-route {
        font-size: 0.45rem;
        top: 10px;
      }
    }

    @media (max-width: 480px) {
      .pair-circle {
        width: 120px;
        height: 120px;
      }
      .circle-sprite {
        width: 68px;
        height: 68px;
      }
      .circle-sprite.p1 {
        top: 20px;
        right: 36px;
      }
      .circle-sprite.p2 {
        top: 34px;
        right: 18px;
      }
      .pair-names {
        font-size: 0.5rem;
        bottom: 10px;
      }
      .pair-route {
        font-size: 0.4rem;
        top: 8px;
      }
      #pairs-container {
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       OVERLAY
       ============================================================ -->
  <div id="overlay" class="hidden">

    <!-- Header -->
    <div id="header">
      <span class="status-dot" id="statusDot"></span>
      <div class="title-group">
        <h1>SOUL LINK</h1>
        <span class="run-id" id="runIdDisplay"></span>
      </div>
      <span class="player-names" id="playerNamesDisplay"></span>
    </div>

    <!-- Loading State -->
    <div id="loading" class="active">
      <div class="loading-spinner"></div>
      <div>Connecting to Soul Link...</div>
    </div>

    <!-- Error State -->
    <div id="error">
      <div>⚠ Connection Error</div>
      <div id="errorMessage" style="font-size:0.6rem;margin-top:4px;"></div>
    </div>

    <!-- Empty State -->
    <div id="empty">
      <div>No Soul Link pairs yet</div>
      <div style="font-size:0.55rem;margin-top:4px;opacity:0.5;">Add Pokémon to get started!</div>
    </div>

    <!-- Pairs Row (horizontal circles) -->
    <div id="pairs-container" style="display:none;"></div>

    <!-- Admin Panel -->
    <div id="admin-panel">
      <div class="admin-label">⚙ Admin — Click to simulate a swap</div>
      <div id="admin-buttons" style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;"></div>
    </div>

  </div>

  <script>
    // ============================================================
    //  FIREBASE CONFIGURATION
    //  Replace these values with your own Firebase project config.
    //  Get these from: Firebase Console → Project Settings → General
    //  → Your apps → Web app → Firebase SDK snippet → Config
    // ============================================================
    // On localhost the emulator uses the soullocke-f7500 namespace.
    // In production the real cloud database uses soullocke-31a7f.
    const DB_URL = window.location.hostname === 'localhost'
      ? "https://soullocke-f7500-default-rtdb.firebaseio.com"
      : "https://soullocke-31a7f-default-rtdb.europe-west1.firebasedatabase.app";

    const firebaseConfig = {
      apiKey: "AIzaSyCw4fEs5t1WJy3TWC93Tuz-Fmq-2z0nJLg",
      authDomain: "soullocke-31a7f.firebaseapp.com",
      databaseURL: DB_URL,
      projectId: "soullocke-31a7f",
      storageBucket: "soullocke-31a7f.firebasestorage.app",
      messagingSenderId: "279335192963",
      appId: "1:279335192963:web:cb901cf503c718fae50eb6",
      measurementId: "G-RY3Y5G02QF"
    };

    // ============================================================
    //  URL PARAMETERS
    // ============================================================
    const urlParams = new URLSearchParams(window.location.search);
    const RUN_ID = urlParams.get('run') || 'nitrous-gerbil-65';
    const IS_ADMIN = urlParams.get('admin') === 'true';
    const SHINY = urlParams.get('shiny') === 'true';
    const FEMALE = urlParams.get('female') === 'true';

    // ============================================================
    //  DOM REFS
    // ============================================================
    const overlayEl = document.getElementById('overlay');
    const statusDot = document.getElementById('statusDot');
    const runIdDisplay = document.getElementById('runIdDisplay');
    const playerNamesDisplay = document.getElementById('playerNamesDisplay');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const errorMessage = document.getElementById('errorMessage');
    const emptyEl = document.getElementById('empty');
    const pairsContainer = document.getElementById('pairs-container');
    const adminPanel = document.getElementById('admin-panel');
    const adminButtons = document.getElementById('admin-buttons');

    // ============================================================
    //  SPRITE URL BUILDER
    //  Uses Gen V Black/White sprites from PokeAPI
    // ============================================================
    const SPRITE_BASE =
      'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white';

    // Cache for species → dex ID lookups
    const dexCache = {};

    // Pokémon type → hex color (primary type colors)
    const TYPE_COLORS = {
      normal: '#A8A878', fire: '#F08030', water: '#6890F0',
      electric: '#F8D030', grass: '#78C850', ice: '#98D8D8',
      fighting: '#C03028', poison: '#A040A0', ground: '#E0C068',
      flying: '#A890F0', psychic: '#F85888', bug: '#A8B820',
      rock: '#B8A038', ghost: '#705898', dragon: '#7038F8',
      dark: '#705848', steel: '#B8B8D0', fairy: '#EE99AC',
    };

    // Cache for species → primary type name
    const typeCache = {};

    async function getPrimaryType(speciesName) {
      const name = speciesName.toLowerCase().trim();
      if (typeCache[name]) return typeCache[name];

      try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        if (!res.ok) return null;
        const data = await res.json();
        const typeName = data.types?.[0]?.type?.name || null;
        typeCache[name] = typeName;
        return typeName;
      } catch {
        return null;
      }
    }

    async function getDexId(speciesName) {
      const name = speciesName.toLowerCase().trim();
      if (dexCache[name]) return dexCache[name];

      try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        if (!res.ok) return null;
        const data = await res.json();
        dexCache[name] = data.id;
        return data.id;
      } catch {
        return null;
      }
    }

    function buildSpriteUrl(dexId, shiny, female) {
      if (!dexId) return null;

      let path = `${SPRITE_BASE}/`;

      if (shiny && female) {
        path += `shiny/female/${dexId}.png`;
      } else if (shiny) {
        path += `shiny/${dexId}.png`;
      } else if (female) {
        path += `female/${dexId}.png`;
      } else {
        path += `${dexId}.png`;
      }

      return path;
    }

    // ============================================================
    //  FIREBASE INIT
    //  Note: The database is publicly readable (the tracker doesn't
    //  use auth), so we skip authentication entirely.
    // ============================================================
    let firebaseApp, db, runRef;

    function initFirebase() {
      try {
        firebaseApp = firebase.apps.length
          ? firebase.app()
          : firebase.initializeApp(firebaseConfig);
        db = firebaseApp.database();

        // Connect to local emulator for development/testing.
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
          db.useEmulator('localhost', 9000);
          console.log('[Overlay] Using Firebase emulator on localhost:9000');
        }

        return true;
      } catch (err) {
        console.error('[Overlay] Firebase init error:', err);
        return false;
      }
    }

    // ============================================================
    //  DATA SUBSCRIPTION (no auth needed — public read access)
    // ============================================================
    function connectToRun() {
      showLoading();

      try {
        const path = `${RUN_ID}`;
        console.log('[Overlay] 🔍 Reading from Firebase path:', path);
        console.log('[Overlay] 🔍 Firebase config:', {
          projectId: firebaseConfig.projectId,
          databaseURL: firebaseConfig.databaseURL,
          hostname: window.location.hostname,
        });

        runRef = db.ref(path);

        runRef.on('value', (snapshot) => {
          console.log('[Overlay] 📦 Snapshot received. Exists:', snapshot.exists(), 'Key:', snapshot.key);
          const data = snapshot.val();
          if (!data) {
            console.warn('[Overlay] ❌ Snapshot val() is null/undefined. Run not found at path:', path);
            console.log('[Overlay] 🔎 Snapshot toJSON:', JSON.stringify(snapshot.toJSON()));
            showError('Run not found. Check your run ID.');
            return;
          }
          console.log('[Overlay] ✅ Run data received. Keys:', Object.keys(data));
          console.log('[Overlay] 📋 Data preview:', JSON.stringify(data).substring(0, 500));
          handleRunUpdate(data);
        });

        statusDot.className = 'status-dot';
        runIdDisplay.textContent = RUN_ID;

      } catch (err) {
        console.error('[Overlay] Connection error:', err);
        showError(err.message || 'Failed to connect to Firebase');
      }
    }

    // ============================================================
    //  DATA HANDLING
    // ============================================================
    const EventType = {
      catch: 0,
      missed: 1,
      moved: 2,
      defeated: 3,
      soulDeath: 4,
      evolved: 5,
      soulMiss: 6,
    };

    function hasFaintedEvent(pokemon) {
      if (!pokemon || !pokemon.events) return false;
      const events = Object.values(pokemon.events);
      return events.some(
        (e) =>
          e.type === EventType.defeated ||
          e.type === EventType.soulDeath
      );
    }

    function isPokemonDead(pokemon) {
      return hasFaintedEvent(pokemon);
    }

    /**
     * If a Pokémon has an evolved event, return the evolved species name.
     * Otherwise return the original name.
     */
    function getEffectiveSpeciesName(pokemon) {
      if (!pokemon || !pokemon.events) return pokemon?.name || null;
      const events = Object.values(pokemon.events);
      // Find the latest evolved event
      let evolvedName = null;
      for (const e of events) {
        if (e.type === EventType.evolved && e.details?.evolution) {
          evolvedName = e.details.evolution;
        }
      }
      return evolvedName || pokemon.name || null;
    }

    function getPlayerPokemonList(player) {
      if (!player || !player.pokemon) return [];
      return Object.entries(player.pokemon).map(([originKey, p]) => ({
        ...p,
        originKey,
      }));
    }

    async function handleRunUpdate(data) {
      const players = data.players;
      const timeline = data.timeline || {};
      const swaps = data.swaps || {};

      if (!players) {
        showEmpty();
        return;
      }

      const playerEntries = Object.entries(players);
      if (playerEntries.length === 0) {
        showEmpty();
        return;
      }

      // Update player names in header
      const playerNames = playerEntries.map(([, p]) => p.name || 'Player').join(' & ');
      playerNamesDisplay.textContent = playerNames;

      // Build a map: originKey → human-readable route name
      const routeNames = {};
      if (timeline) {
        Object.values(timeline).forEach((entry) => {
          if (entry && entry.key && entry.name) {
            routeNames[entry.key] = entry.name;
          }
        });
      }

      // Collect all unique origin keys across all players
      const originMap = {}; // originKey → { p1Pokemon, p2Pokemon }
      playerEntries.forEach(([playerId, player]) => {
        const pokemonList = getPlayerPokemonList(player);
        pokemonList.forEach((p) => {
          const key = p.originKey;
          if (!originMap[key]) {
            originMap[key] = { p1: null, p2: null };
          }
          if (playerEntries[0][0] === playerId) {
            originMap[key].p1 = p;
          } else {
            originMap[key].p2 = p;
          }
        });
      });

      // Build pairs array
      const pairs = [];
      for (const [originKey, pair] of Object.entries(originMap)) {
        const routeName = routeNames[originKey] || originKey;
        const swappedAt = swaps[originKey]?.swappedAt || null;

        pairs.push({
          originKey,
          routeName,
          p1: pair.p1,
          p2: pair.p2,
          swappedAt,
        });
      }

      // Sort: swapped pairs first, then alive pairs, then dead pairs
      pairs.sort((a, b) => {
        if (a.swappedAt && !b.swappedAt) return -1;
        if (!a.swappedAt && b.swappedAt) return 1;

        const aDead = (a.p1 && isPokemonDead(a.p1)) || (a.p2 && isPokemonDead(a.p2));
        const bDead = (b.p1 && isPokemonDead(b.p1)) || (b.p2 && isPokemonDead(b.p2));

        if (aDead && !bDead) return 1;
        if (!aDead && bDead) return -1;
        return 0;
      });

      // Render
      await renderPairs(pairs);
      setupAdminPanel(pairs);

      hideAllStates();
      if (pairs.length === 0) {
        showEmpty();
      } else {
        pairsContainer.style.display = 'flex';
      }
    }

    // ============================================================
    //  RENDER — horizontal circles with Box-style duo layout
    // ============================================================
    async function renderPairs(pairs) {
      pairsContainer.innerHTML = '';

      if (pairs.length === 0) return;

      // Batch resolve dex IDs and type colors (use evolved species name if applicable)
      const dexPromises = [];
      const typePromises = [];
      for (const pair of pairs) {
        const name1 = pair.p1 ? getEffectiveSpeciesName(pair.p1) : null;
        const name2 = pair.p2 ? getEffectiveSpeciesName(pair.p2) : null;
        dexPromises.push(name1 ? getDexId(name1) : Promise.resolve(null));
        dexPromises.push(name2 ? getDexId(name2) : Promise.resolve(null));
        typePromises.push(name1 ? getPrimaryType(name1) : Promise.resolve(null));
        typePromises.push(name2 ? getPrimaryType(name2) : Promise.resolve(null));
      }
      const dexIds = await Promise.all(dexPromises);
      const typeNames = await Promise.all(typePromises);

      pairs.forEach((pair, idx) => {
        const dexId1 = dexIds[idx * 2];
        const dexId2 = dexIds[idx * 2 + 1];
        const type1 = typeNames[idx * 2];
        const type2 = typeNames[idx * 2 + 1];

        const p1Dead = pair.p1 && isPokemonDead(pair.p1);
        const p2Dead = pair.p2 && isPokemonDead(pair.p2);
        const isDead = p1Dead || p2Dead;
        const isSwapped = !!pair.swappedAt;

        // Build the circle
        const circle = document.createElement('div');
        circle.className = 'pair-circle';
        if (isDead) circle.classList.add('dead');
        if (isSwapped) circle.classList.add('swapped');
        circle.dataset.origin = pair.originKey;

        // Apply type-colored diagonal gradient (only if alive)
        if (!isDead) {
          const c1 = TYPE_COLORS[type1] || 'rgba(255,255,255,0.08)';
          const c2 = TYPE_COLORS[type2] || 'rgba(255,255,255,0.08)';
          circle.style.background = `
            linear-gradient(135deg,
              ${c1}44 0%, ${c1}11 50%,
              ${c2}11 50%, ${c2}44 100%
            )
          `;
        }

        // Route name (top of circle)
        const routeEl = document.createElement('span');
        routeEl.className = 'pair-route';
        routeEl.textContent = pair.routeName;
        circle.appendChild(routeEl);

        // Sprite 1 (player 1) — higher, offset left
        if (pair.p1) {
          const spriteUrl1 = buildSpriteUrl(dexId1, SHINY, FEMALE);
          if (spriteUrl1) {
            const img1 = document.createElement('img');
            img1.className = 'circle-sprite p1';
            if (p1Dead) img1.classList.add('dead');
            img1.src = spriteUrl1;
            img1.alt = pair.p1.name || 'pokemon';
            img1.loading = 'lazy';
            img1.onerror = function() { this.style.display = 'none'; };
            circle.appendChild(img1);
          }
        }

        // Sprite 2 (player 2) — lower, offset right
        if (pair.p2) {
          const spriteUrl2 = buildSpriteUrl(dexId2, SHINY, FEMALE);
          if (spriteUrl2) {
            const img2 = document.createElement('img');
            img2.className = 'circle-sprite p2';
            if (p2Dead) img2.classList.add('dead');
            img2.src = spriteUrl2;
            img2.alt = pair.p2.name || 'pokemon';
            img2.loading = 'lazy';
            img2.onerror = function() { this.style.display = 'none'; };
            circle.appendChild(img2);
          }
        }

        // Names — "Name1" at top of circle, "& Name2" at bottom
        const name1 = pair.p1 ? (pair.p1.nickname || pair.p1.name || '?') : '—';
        const name2 = pair.p2 ? (pair.p2.nickname || pair.p2.name || '?') : '—';
        // Primary name (top of circle)
        const primaryName = document.createElement('span');
        primaryName.className = 'pair-name-primary';
        if (isDead) primaryName.classList.add('dead');
        primaryName.textContent = name1;
        circle.appendChild(primaryName);
        // Secondary name with "&" prefix (bottom of circle)
        const secondaryName = document.createElement('span');
        secondaryName.className = 'pair-name-secondary';
        if (isDead) secondaryName.classList.add('dead');
        secondaryName.textContent = `& ${name2}`;
        circle.appendChild(secondaryName);

        pairsContainer.appendChild(circle);
      });
    }

    // ============================================================
    //  ADMIN PANEL
    // ============================================================
    function setupAdminPanel(pairs) {
      if (!IS_ADMIN) {
        adminPanel.classList.remove('active');
        return;
      }
      adminPanel.classList.add('active');
      adminButtons.innerHTML = '';

      for (const pair of pairs) {
        const btn = document.createElement('button');
        btn.className = 'admin-swap-btn';
        btn.textContent = `⤾ ${pair.routeName}`;
        btn.dataset.origin = pair.originKey;

        btn.addEventListener('click', async () => {
          btn.disabled = true;
          btn.textContent = '⤾ Swapping...';
          try {
            const swapRef = db.ref(`${RUN_ID}/swaps/${pair.originKey}`);
            await swapRef.set({
              swappedAt: Date.now(),
            });
            btn.textContent = '⤾ Swapped!';
            setTimeout(() => {
              btn.textContent = `⤾ ${pair.routeName}`;
              btn.disabled = false;
            }, 2000);
          } catch (err) {
            console.error('[Overlay] Swap error:', err);
            btn.textContent = '✕ Error';
            setTimeout(() => {
              btn.textContent = `⤾ ${pair.routeName}`;
              btn.disabled = false;
            }, 3000);
          }
        });

        adminButtons.appendChild(btn);
      }
    }

    // ============================================================
    //  UI HELPERS
    // ============================================================
    function showLoading() {
      loadingEl.classList.add('active');
      errorEl.classList.remove('active');
      emptyEl.classList.remove('active');
      pairsContainer.style.display = 'none';
    }

    function showError(msg) {
      loadingEl.classList.remove('active');
      errorEl.classList.add('active');
      emptyEl.classList.remove('active');
      pairsContainer.style.display = 'none';
      errorMessage.textContent = msg || 'Unknown error';
      statusDot.className = 'status-dot error';
    }

    function showEmpty() {
      loadingEl.classList.remove('active');
      errorEl.classList.remove('active');
      emptyEl.classList.add('active');
      pairsContainer.style.display = 'none';
    }

    function hideAllStates() {
      loadingEl.classList.remove('active');
      errorEl.classList.remove('active');
      emptyEl.classList.remove('active');
    }

    // ============================================================
    //  INIT
    // ============================================================
    function init() {
      if (!initFirebase()) {
        showError('Failed to initialize Firebase. Check your config.');
        return;
      }

      // Show overlay with a small delay for smooth entrance
      setTimeout(() => {
        overlayEl.classList.remove('hidden');
      }, 300);

      connectToRun();
    }

    // Start when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
